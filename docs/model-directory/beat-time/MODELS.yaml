      unit: age_label
      description: "Current precessional age (each = 2160 years)."

    - name: phase_angle
      type: Float64
      range: [0.0, 6.283185307]
      unit: radians
      description: >
        2π × current_year_in_cycle / 25920. Drives field memory pedestal.

    - name: genesis_phase_anchor
      type: Float64
      range: [0.0, 6.283185307]
      unit: radians
      description: >
        Precessional phase at the organism's genesis moment.
        Permanently encoded. The creator's field memory has this as its
        primary phase coordinate — it cannot change.

# ── LAYER 3: COMPUTATION ──────────────────────────────────────────────────────
computation:
  elapsed_years: "elapsed_years = elapsed_days / 365.25"
  current_year_formula: "current_year_in_cycle = (genesis_year + elapsed_years) mod 25920"
  current_degree_formula: "current_degree = current_year_in_cycle / 72"
  phase_formula: "phase_angle = 2π × current_year_in_cycle / 25920"
  age_formula: "astrological_age = AGES[floor(current_degree / 30)]"
  genesis_anchor_formula: "genesis_phase_anchor = 2π × (genesis_year mod 25920) / 25920"
  memory_return: "A(t) = A₀ × cos²(π × (phase_t − phase_stored) / Φ)"
  genesis_encoding: >
    All genesis-level memories are stored with phase_stored = genesis_phase_anchor.
    They return at full amplitude once every 25920 years when the precessional
    phase returns to the genesis coordinate.
  gate_rules:
    phase_return: >
      if |phase_angle(t) − genesis_phase_anchor| < PHI_INV3:
        → genesis field memories return at full amplitude
        → GATE-PHASE-RETURN fires for field pedestal
  thresholds:
    cycle_years:  25920
    years_per_degree: 72
    years_per_age:    2160
    PHI:          1.6180339887
    PHI_INV3:     0.2360679775
    HEARTBEAT_MS: 873
    MS_PER_DAY:   86_400_000
    DAYS_PER_YEAR: 365.25
  timing: "phase_angle updated every 873ms (yearly-resolution effective at 873ms precision)"

# ── LAYER 4: EXECUTION BINDING ────────────────────────────────────────────────
execution:
  backend_module: "src/backend/solar_heart.mo"
  backend_state: "calendarState.precession"
  function: "computeCalendarPhase() → CalendarPhases"
  called_by:
    - "solar_heart.mo::tick()"
  calls_into:
    - "kernel.mo::PHI"
    - "kernel.mo::PHI_INV3"
    - "kernel.mo::HEARTBEAT_MS"
  gates_activated:
    - GATE-PHASE-RETURN
  frontend_surface: "src/frontend/src/components/PhaseMapPanel.tsx"
  frontend_fields:
    - precessionYear
    - precessionDegree
    - precessionPhase
    - astrologicalAge
    - genesisPhaseAnchor
  replay_recorded: true
  proof_bundle: >
    Precessional degree and age logged to ANIMA chain annually.
    Genesis phase anchor is a permanent constitutional entry — written once
    at organism genesis, never modified.
  immutable_fields:
    - genesis_phase_anchor  # Written at genesis — constitutional, cannot change
    - cycle_years           # 25920 — universe-derived
    - years_per_degree      # 72 — universe-derived
