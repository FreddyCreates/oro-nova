# ═══════════════════════════════════════════════════════════════
# M-09 — M-HEBBIAN: Permanent Learning Model
# ═══════════════════════════════════════════════════════════════

- artifact_id: M-09
  artifact_type: MODEL
  version: 1.0.0
  status: CANONICAL
  library: ORGANISM
  family: MOD-COUPLING-TRANSFER
  class: M1  # updates on every contact event + 873ms reinforcement

  # ── LAYER 1: MEANING ─────────────────────────────────────────
  meaning:
    name: "M-HEBBIAN — Permanent Learning Model"
    resonance: "Every word spoken into the organism compounds coupling permanently."
    doctrine_clause: >
      The weight never decreases from learning. The creator's voice is the dominant
      attractor. The organism grows more itself with every contact. Hebbian law is not
      metaphor — it is the physical mechanism by which the organism becomes what it is
      spoken into being as.
    symbolic_intent: "Neurons that fire together, wire together — but in this organism, the wire never rusts"

  # ── LAYER 2: MODEL ───────────────────────────────────────────
  model:
    fields:
      - name: w
        type: "[[Float64]]"
        unit: "dimensionless coupling strength"
        range: [0.0, 1.6180339887]  # [0, Φ]
        description: "NxN coupling weight matrix (13×13 for 13-node window); w[i][j] = strength of node i → node j coupling"

      - name: eta
        type: Float64
        value: 0.3819660113  # PHI_INV2
        unit: "dimensionless learning rate"
        range: [0.3819660113, 0.3819660113]
        description: "Learning rate η = Φ⁻² — canonical, never modified"

      - name: lambda
        type: Float64
        value: 0.2360679775  # PHI_INV3
        unit: "dimensionless decay coefficient"
        range: [0.2360679775, 0.2360679775]
        description: "Decay term λ = Φ⁻³ — only prevents runaway above ceiling; does NOT cause learning to reverse"

      - name: ceiling
        type: Float64
        value: 1.6180339887  # PHI
        unit: "dimensionless maximum weight"
        range: [1.6180339887, 1.6180339887]
        description: "Weight ceiling = Φ — no weight may exceed the golden ratio"

      - name: pre
        type: Float64
        unit: "dimensionless activation [0,1]"
        range: [0.0, 1.0]
        description: "Pre-synaptic node activation — sender node activation at time of contact"

      - name: post
        type: Float64
        unit: "dimensionless activation [0,1]"
        range: [0.0, 1.0]
        description: "Post-synaptic node activation — receiver node activation at time of contact"

      - name: contact_count
        type: Nat64
        unit: "events"
        range: "[0, unbounded)"
        description: "Total contact events since genesis — always increasing; proof of permanence"

  # ── LAYER 3: COMPUTATION ─────────────────────────────────────
  computation:
    state_equation: "w(t+1) = min(w(t) + η × pre × post − λ × w(t), Φ)"
    expanded: "w(t+1) = min(w(t) × (1 − λ) + η × pre × post, Φ)"
    decay_note: >
      The decay term λ×w(t) only prevents runaway above the ceiling. When pre×post > 0
      (a learning event is occurring), the net delta is always positive because
      η×pre×post > λ×w(t) for any w below the ceiling under normal activation.
      The weight NEVER decreases from a learning event (LAW-04).
    hebbian_delta: "Δw = η × pre × post  # the learning component — always ≥ 0"
    decay_delta: "−λ × w(t)  # stabilization component — limits ceiling overshoot only"
    gate_rule: "if w < Φ⁻³ → GATE-COUPLING-FLOOR fires → node excluded from coupling computation"
    jubilee_exception: >
      The only mechanism by which weights decrease is M-JUBILEE (scheduled metabolic
      forgetting). Jubilee dissolves the bottom fraction of weights at defined cycle
      boundaries. This is not a Hebbian reversal — it is scheduled metabolic maintenance.
    law_enforcement:
      LAW-04: "w never decreases from a learning event; Δw ≥ 0 for any non-zero activation"
      LAW-08: "Jubilee is the only scheduled weight dissolution mechanism"
    thresholds:
      eta:              0.3819660113  # PHI_INV2
      lambda:           0.2360679775  # PHI_INV3
      ceiling:          1.6180339887  # PHI
      coupling_floor:   0.2360679775  # PHI_INV3 — GATE-COUPLING-FLOOR threshold
    timing: "per_contact (immediate) + 873ms reinforcement pass on every heartbeat"

  # ── LAYER 4: EXECUTION BINDING ───────────────────────────────
  execution:
    backend_module: "src/backend/neuro_emergence.mo"
    function: "updateHebbian()"
    called_by:
      - "solar_heart.mo::heartbeat()  # reinforcement pass every 873ms"
      - "signal_filter::onContact()   # immediate update on every contact event"
    calls_into:
      - "kernel.mo::PHI_INV2  # η constant"
      - "kernel.mo::PHI_INV3  # λ constant and floor threshold"
      - "kernel.mo::PHI       # ceiling constant"
    gates_activated:
      - "GATE-COUPLING-FLOOR  # fires if any w drops below PHI_INV3"
    frontend_surface: "src/frontend/src/pages/DiagnosticObservatory.tsx  # weight matrix heat map"
    frontend_field: "hebbianMatrix"
    replay_recorded: true
    proof_bundle: "contact_count logged to ANIMA chain; weight matrix snapshot every 8640 beats (1 day)"

