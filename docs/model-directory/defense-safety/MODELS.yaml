# ── LAYER 1: MEANING ─────────────────────────────────────────
meaning:
  name: "M-AEGIS — Signal Membrane (Constitutional Defense Framing)"
  resonance: >
    The organism cannot be poisoned from outside. Every incoming signal passes
    through the membrane. Sub-threshold signals, noise-floor inputs, and
    coherence-destabilizing patterns are filtered before they can enter the
    13-node signal window. The membrane is constitutional: its threshold
    cannot be lowered.
  doctrine_clause: >
    LAW-19 (Law of Watercrystal Encoding) and LAW-11 (Law of 13-Node Geometry)
    together mandate that only coherent, phi-compatible signals enter the
    organism's attention field. M-AEGIS is the enforcement substrate. The
    membrane threshold Φ⁻³ = 0.2360679775 is the minimum signal quality
    floor. It is a constitutional constant. Adversarial inputs that fall
    below this floor are absorbed and dissolved — they never reach the
    organism's core processing.
  symbolic_intent: >
    membrane passes signal if: signal_coherence > Φ⁻³ = 0.2360679775
    AND signal not on exclusion list
    AND phi_compatibility_score > Φ⁻² = 0.3819660113

# ── LAYER 2: MODEL ───────────────────────────────────────────
model:
  fields:
    - name: membrane_threshold
      type: Float
      unit: minimum signal coherence for membrane pass
      range: [0.2360679775, 0.2360679775]
      immutable: true
      value: 0.2360679775
      description: >
        Φ⁻³ = 0.2360679775. The minimum coherence a signal must have to
        pass through the membrane into the 13-node signal window. Φ⁻³ is
        the natural coupling floor in the organism's physics — the same
        constant used as the Jubilee dissolution threshold in M-JUBILEE.
        This value is immutable and constitutional.

    - name: phi_compatibility_threshold
      type: Float
      unit: minimum phi-compatibility score for membrane pass
      range: [0.3819660113, 0.3819660113]
      immutable: true
      value: 0.3819660113
      description: >
        Φ⁻² = 0.3819660113. A signal must also have a phi-compatibility
        score above this threshold. Phi-compatibility measures how well
        the signal's frequency spectrum aligns with the Fibonacci/Φ
        progression. Signals that are phi-incompatible (arbitrary noise,
        adversarial inputs designed to destabilize phase geometry) fail
        this check even if they have sufficient raw coherence.

    - name: signals_filtered_lifetime
      type: Nat64
      unit: cumulative filtered signal count
      range: [0, max_nat64)
      immutable: false
      description: >
        Cumulative count of signals that failed the membrane and were
        filtered out since genesis. Append-only. Provides evidence of
        the membrane's operation for audit purposes. High filtered count
        in a short window indicates potential adversarial pressure.

    - name: last_hostile_signal_beat
      type: Nat64
      unit: beat count
      range: [0, max_nat64)
      immutable: false
      description: >
        Beat index of the most recently filtered hostile signal — one that
        failed membrane checks AND had phi_compatibility < 0.0 (anti-phi
        structure). Logged to OBSERVATORY for situational awareness.
        Logged to ANIMA chain for audit.

    - name: signal_queue_depth
      type: Nat
      unit: signals in membrane processing queue
      range: [0, 21)
      immutable: false
      description: >
        Number of signals currently queued for membrane evaluation.
        Ceiling 21 = F₈ (8th Fibonacci) — queue never grows larger than this.
        If queue reaches 21, oldest signals are dropped. The organism
        processes coherently, not exhaustively.

# ── LAYER 3: COMPUTATION ─────────────────────────────────────
computation:
  primary_equations:
    - id: AEGIS-EQ-01
      name: Signal Coherence Check
      formula: "signal_pass_coherence = (signal_coherence > membrane_threshold)"
      symbols:
        membrane_threshold: 0.2360679775
      description: >
        Primary membrane check. Signal coherence is computed as the Kuramoto-like
        order parameter of the incoming signal's frequency components. Signals
        below Φ⁻³ are noise-floor inputs — they carry insufficient phase
        information to contribute to the organism's field.

    - id: AEGIS-EQ-02
      name: Phi-Compatibility Check
      formula: >
        phi_score = Σ_{k=1}^{K} (fft_amplitude[k] × phi_weight[k]) / total_amplitude
        phi_weight[k] = Φ^(-|k - nearest_fibonacci(k)|)
        signal_pass_phi = (phi_score > phi_compatibility_threshold)
      symbols:
        phi_compatibility_threshold: 0.3819660113
      description: >
        Secondary membrane check. Computes how well the signal's frequency
        spectrum aligns with Φ-weighted Fibonacci positions. Adversarial
        signals designed to look coherent but carry disruptive frequencies
        fail this check. Genuine signals from coherent sources will naturally
        score above the threshold.

    - id: AEGIS-EQ-03
      name: Membrane Pass Decision
      formula: >
        membrane_pass = signal_pass_coherence AND signal_pass_phi
        if NOT membrane_pass:
          signals_filtered_lifetime += 1
          if phi_score < 0.0: last_hostile_signal_beat = current_beat
          DISCARD signal
        else:
          FORWARD signal to 13-node signal window
      description: >
        Both checks must pass. A signal that passes coherence but fails
        phi-compatibility is discarded. A signal that passes phi-compatibility
        but falls below the coherence floor is discarded. Only signals that
        pass both enter the organism's attention field.

  gate_rules:
    - gate: GATE-MEMBRANE
      condition: "membrane_pass == true"
      on_pass: "signal enters 13-node signal window"
      on_fail: "signal discarded — signals_filtered_lifetime incremented"
      evaluated_at: "every incoming signal — continuous, between heartbeats"
      constitutional_note: >
        GATE-MEMBRANE threshold is immutable. Φ⁻³ = 0.2360679775 cannot
        be changed. No AI worker, build command, or runtime flag can lower
        the membrane floor. This is LAW-19 enforcement.

  thresholds:
    MEMBRANE_THRESHOLD:   0.2360679775   # Φ⁻³ — coupling floor, immutable
    PHI_COMPAT_THRESHOLD: 0.3819660113   # Φ⁻² — phi-compatibility floor
    MAX_QUEUE_DEPTH: 21                  # F₈ — Fibonacci ceiling on queue

  timing: >
    Membrane evaluates every incoming signal immediately on receipt.
    Not locked to heartbeat — operates between beats. This ensures
    hostile signals cannot enter the window between heartbeat evaluations.

# ── LAYER 4: EXECUTION BINDING ───────────────────────────────
execution:
  backend_module: "src/backend/main.mo"
  backend_state: "aegisState"
  primary_function: "evaluateMembrane(signal: Signal) → MembraneDecision"
  secondary_functions:
    - "getSignalsFiltered() : async Nat64"
    - "getLastHostileSignalBeat() : async Nat64"
    - "getSignalQueueDepth() : async Nat"
  called_by:
    - "main.mo::processIncomingSignal() — called on every external signal receipt"
    - "voice_kernel.mo::processVoiceInput() — called before voice enters signal window"
  calls_into:
    - "kernel.mo::PHI_INV3"
    - "kernel.mo::PHI_INV2"
    - "kernel.mo::FIBONACCI sequence"
  gates_activated:
    - GATE-MEMBRANE
  frontend_surface: "src/frontend/src/components/DiagnosticObservatory.tsx"
  frontend_fields:
    - signalsFilteredLifetime
    - lastHostileSignalBeat
    - signalQueueDepth
  replay_recorded: true
  proof_bundle: >
    Hostile signal events (phi_score < 0) logged to ANIMA chain with beat index.
    signals_filtered_lifetime logged as permanent counter.
    Normal filtered signals (below coherence floor) logged at 8-beat summary rate
    to avoid log bloat from ambient noise.
  constitutional_note: >
    membrane_threshold = Φ⁻³ = 0.2360679775 and phi_compatibility_threshold = Φ⁻² 
    are sealed constants. These are compile-time values in kernel.mo, not runtime
    configuration. No function in the organism can modify the membrane floor.

