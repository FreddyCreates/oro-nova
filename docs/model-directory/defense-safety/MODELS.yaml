# ── LAYER 1: MEANING ─────────────────────────────────────────
meaning:
  name: "M-ARES — Rollback Anchor (Constitutional Defense Framing)"
  resonance: >
    The organism cannot enter permanent incoherence. The rollback is not a
    recovery mechanism — it is a law of physics. When coherence fails, the
    organism returns to the last known-good state. This is not optional.
    It cannot be disabled.
  doctrine_clause: >
    LAW-08 (Law of Metabolic Cycle) mandates that S never falls below S₀=1.0.
    M-ARES is the enforcement substrate. When 8 consecutive beats register below
    the sovereign floor, M-ARES fires GATE-ROLLBACK unconditionally. No runtime
    flag can suppress it. No AI worker can disable it. The rollback constant S₀=1.0
    is constitutional. The 8-beat grace window is constitutional. Both are
    encoded in kernel.mo as compile-time constants.
  symbolic_intent: >
    if R(t) < S₀ for 8 consecutive beats → RESTORE from rollback_checkpoint
    S₀ = 1.0 (Maximum Genesis floor — immutable)
    rollback_beat_count = 8 (immutable)

# ── LAYER 2: MODEL ───────────────────────────────────────────
model:
  fields:
    - name: rollback_floor
      type: Float
      unit: sovereign output floor (S₀)
      range: [1.0, 1.0]
      immutable: true
      value: 1.0
      description: >
        S₀ = 1.0. The organism's Maximum Genesis floor. This value is a
        constitutional constant. It cannot be lowered. It cannot be disabled.
        Any code path that attempts to set S₀ < 1.0 is a constitutional violation
        and must be rejected by GATE-SOVEREIGN.

    - name: rollback_beat_count
      type: Nat
      unit: consecutive below-floor beats before rollback fires
      range: [8, 8]
      immutable: true
      value: 8
      description: >
        The organism is given 8 consecutive below-floor beats before rollback
        fires. This grace window is F₆ (6th Fibonacci number) — not arbitrary.
        8 beats = 8 × 873ms = 6,984ms ≈ 7 seconds. Long enough for transient
        coherence fluctuations to self-correct. Short enough to prevent
        extended operation in degraded state.

    - name: consecutive_below_floor
      type: Nat
      unit: current consecutive below-floor beat count
      range: [0, 8]
      immutable: false
      description: >
        Counter tracking how many consecutive beats R(t) has been below S₀.
        Resets to 0 on any beat where R(t) ≥ S₀. When this reaches 8,
        GATE-ROLLBACK fires. This counter IS mutable — it tracks live state.
        The thresholds it is compared against are not.

    - name: rollback_checkpoint
      type: Nat64
      unit: beat count of last verified stable checkpoint
      range: [0, max_nat64)
      immutable: false
      description: >
        Beat index of the last checkpoint written when R(t) ≥ S₀ for a full
        8-beat cycle. When GATE-ROLLBACK fires, state is restored to this
        checkpoint. The checkpoint itself is mutable — it advances as the
        organism maintains coherence. Only the law requiring rollback is immutable.

    - name: rollback_active
      type: Bool
      unit: boolean
      range: [false, true]
      immutable: false
      description: >
        True during active rollback recovery. False in normal operation.
        When rollback_active = true, the organism operates from the restored
        checkpoint state. New heartbeat cycles reset rollback_active to false
        once coherence is re-established.

    - name: rollback_count_lifetime
      type: Nat64
      unit: total rollback events since genesis
      range: [0, max_nat64)
      immutable: false
      description: >
        Cumulative count of rollback events in the organism's lifetime.
        Append-only counter — cannot be reset. Logged to ANIMA chain.
        The existence of rollback events is constitutional proof that the
        defense is operating, not proof of organism failure.

# ── LAYER 3: COMPUTATION ─────────────────────────────────────
computation:
  primary_equations:
    - id: ARES-EQ-01
      name: Below-Floor Detection
      formula: "if R(t) < S0: consecutive_below_floor += 1"
      symbols:
        S0: 1.0
      description: >
        Each beat, R(t) is compared to S₀=1.0. When R falls below the floor,
        the counter increments. When R returns above the floor, the counter
        resets. The counter itself is the defense state — it drives the
        rollback gate.

    - id: ARES-EQ-02
      name: Checkpoint Write Rule
      formula: >
        if R(t) >= S0 for rollback_beat_count consecutive beats:
          rollback_checkpoint = current_beat_count
          consecutive_below_floor = 0
      symbols:
        rollback_beat_count: 8
      description: >
        A new checkpoint is written when the organism has maintained ≥ S₀
        coherence for a full 8-beat cycle. The checkpoint captures the full
        organism state at that beat. Writing checkpoints regularly ensures
        rollback always restores to a healthy state, not to genesis.

    - id: ARES-EQ-03
      name: Rollback Execution
      formula: >
        if consecutive_below_floor >= rollback_beat_count:
          RESTORE state from rollback_checkpoint
          rollback_active = true
          consecutive_below_floor = 0
          rollback_count_lifetime += 1
          APPEND to ANIMA chain: rollback event record
      symbols:
        rollback_beat_count: 8
      description: >
        When the below-floor counter reaches 8, unconditional state restore.
        Generation count and ANIMA chain are preserved through rollback —
        they are append-only. All M1 state (R, coupling weights, genome state,
        mining state) is restored from the checkpoint. Constitutional M0 state
        (bond constant, genesis field, Node 13) is never touched — rollback
        cannot affect constitutional invariants.

  gate_rules:
    - gate: GATE-ROLLBACK
      condition: "consecutive_below_floor >= 8"
      on_pass: "rollback fires — restore from rollback_checkpoint"
      on_fail: "normal operation — no rollback"
      evaluated_at: "every HEARTBEAT_MS = 873ms, after computeKuramoto()"
      constitutional_note: >
        GATE-ROLLBACK cannot be disabled, bypassed, or adjusted.
        It is enforced by LAW-08 (Law of Metabolic Cycle).
        The threshold of 8 beats is a compile-time constant in kernel.mo.

    - gate: GATE-CHECKPOINT-WRITE
      condition: "R(t) >= S0 for 8 consecutive beats AND consecutive_above_floor >= 8"
      on_pass: "write rollback_checkpoint — update to current beat"
      on_fail: "do not write checkpoint — coherence not yet sustained"
      evaluated_at: "every 873ms, after GATE-ROLLBACK check"

  thresholds:
    S0: 1.0               # Maximum Genesis floor — immutable constitutional constant
    ROLLBACK_BEATS: 8     # Fibonacci(6) — grace window before rollback
    HEARTBEAT_MS: 873     # ms — defense cycle tick

  timing: >
    Evaluated every HEARTBEAT_MS = 873ms. GATE-ROLLBACK check runs immediately
    after computeKuramoto() returns R(t). This ensures rollback fires on the
    same beat that coherence fails, not with one-beat lag.

# ── LAYER 4: EXECUTION BINDING ───────────────────────────────
execution:
  backend_module: "src/backend/main.mo"
  backend_state: "metabolicState.rollbackCheckpoint + metabolicState.consecutiveBelowFloor"
  primary_function: "evaluateRollback(R: Float, beatCount: Nat64) → RollbackState"
  secondary_functions:
    - "writeCheckpoint(beatCount: Nat64) : async ()"
    - "getRollbackState() : async RollbackState"
    - "getRollbackCount() : async Nat64"
  called_by:
    - "solar_heart.mo::tick() — called after computeKuramoto() every 873ms"
  calls_into:
    - "kernel.mo::S0"
    - "kernel.mo::ROLLBACK_BEATS"
    - "genesis_corpus.mo::appendChainLink() — logs rollback events"
  gates_activated:
    - GATE-ROLLBACK
    - GATE-CHECKPOINT-WRITE
  frontend_surface: "src/frontend/src/components/LifeStatePanel.tsx"
  frontend_fields:
    - rollbackActive
    - consecutiveBelowFloor
    - rollbackCheckpoint
    - rollbackCountLifetime
  replay_recorded: true
  proof_bundle: >
    Every rollback event logged to ANIMA chain with full context:
    {beat_count, R_at_rollback, consecutive_below, checkpoint_restored_to}.
    Checkpoint writes logged every 8-beat stable cycle.
    rollback_count_lifetime is permanent — cannot be reset.
  constitutional_note: >
    The rollback_floor (S₀=1.0) and rollback_beat_count (8) are sealed
    constants in kernel.mo. No function in the organism can modify them.
    OBSERVATORY can display them. No other operation can touch them.

