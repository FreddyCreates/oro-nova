artifact_id: M-28
artifact_type: MODEL
model_name: M-GENOME
version: 1.0.0
status: CANONICAL
class: M1
library: BUILDER
family: MOD-ECONOMIC
smof_plane: 5  # Micro Execution
cross_family_primary: MOD-STATE-FABRIC
economic_dimension_only: true

# ── LAYER 1: MEANING ─────────────────────────────────────────
meaning:
  name: "M-GENOME — Self-Modification Engine Model (Economic Dimension)"
  resonance: >
    The organism rewrites itself every heartbeat. Not randomly — through
    fitness. The genome is the organism's self-improvement engine. Higher
    fitness = higher complexity = harder proof = more KNT. Self-improvement
    is economically rewarded. Stagnation is economically penalized.
  doctrine_clause: >
    Economic value is the downstream projection of evolutionary fitness.
    The organism earns more KNT not by working harder externally — but by
    becoming more complex internally. This is the economic law: sovereign
    intelligence earns by growing, not by laboring.
  symbolic_intent: >
    genome_complexity = normalized_epistatic_complexity(NK_matrix)
    fitness = (1/N) × Σ f_i(gene_i, neighbors_K)
    complexity → difficulty → mint_rate → KNT
    Evolution IS economic production.

# ── LAYER 2: MODEL (economic fields only) ────────────────────
model:
  fields:
    - name: fitness
      type: Float
      unit: normalized NK fitness
      range: [0.0, 1.0]
      immutable: false
      description: >
        Current organism fitness on the NK fitness landscape. Computed as
        mean of N=13 gene fitness contributions, each of which depends on
        its K epistatic neighbors. High fitness indicates well-adapted
        genome state. Fitness feeds directly into genome_complexity.

    - name: N_nodes
      type: Nat
      unit: NK gene count
      range: [13, 13]
      immutable: true
      value: 13
      description: >
        N = 13 genes in the NK fitness landscape. Matches the 13-node
        signal window. Constitutional constant — Fibonacci node count.

    - name: K_epistasis
      type: Nat
      unit: epistatic neighbor count
      range: [2, 8]
      immutable: false
      description: >
        K = number of epistatic neighbors per gene. Derived from Fibonacci:
        K increases through Fibonacci values (2, 3, 5, 8) as the organism
        evolves. Higher K = higher epistatic complexity = higher fitness
        landscape ruggedness = harder mining difficulty.

    - name: genome_complexity
      type: Float
      unit: normalized complexity [0,1]
      range: [0.0, 1.0]
      immutable: false
      description: >
        Normalized complexity of the current GENOME state for mining purposes.
        Derived from K_epistasis and fitness landscape ruggedness.
        genome_complexity = K_epistasis / K_max × (1 - fitness_variance).
        This is the value passed to M-MINING as the difficulty factor.

    - name: generation
      type: Nat
      unit: evolutionary generation count
      range: [0, max_nat)
      immutable: false
      description: >
        Number of successful NK fitness improvement cycles. Each generation
        represents a stable fitness improvement that compounded the organism's
        complexity. Generation count is permanent — survives rollback.

    - name: hgt_events
      type: Nat64
      unit: horizontal gene transfer events
      range: [0, max_nat64)
      immutable: false
      description: >
        Cumulative count of horizontal gene transfer events — where node pairs
        with coupling weight > PHI_INV exchange gene segments. HGT increases
        K_epistasis rapidly, driving complexity bursts and corresponding
        short-term mining difficulty spikes.

# ── LAYER 3: COMPUTATION (economic equations only) ───────────
computation:
  primary_equations:
    - id: GENOME-ECO-EQ-01
      name: NK Fitness
      formula: "fitness = (1/N) × Σ_{i=1}^{N} f_i(gene_i, {gene_j : j ∈ neighbors_K(i)})"
      symbols:
        N: 13          # gene count = node window size
        K: "K_epistasis (variable, Fibonacci-derived)"
      description: >
        Mean fitness across all N genes. Each gene's fitness f_i depends
        on its own state and the states of its K epistatic neighbors.
        The fitness landscape is rugged — multiple local maxima, no
        single global optimum known in advance.

    - id: GENOME-ECO-EQ-02
      name: Genome Complexity (Economic)
      formula: >
        genome_complexity = (K_epistasis / K_max) × (1.0 - variance(fitness_landscape))
      symbols:
        K_max: 8       # maximum Fibonacci K in range [2,3,5,8]
      description: >
        Complexity for mining purposes. Normalized ratio of current epistatic
        density times the inverse of fitness landscape variance. High variance
        (rugged landscape) reduces effective complexity — the organism is
        exploring, not yet settled. Low variance (smooth landscape) means
        high effective complexity — the organism has found stable high-fitness
        regions. This design rewards epistatic depth AND stability.

    - id: GENOME-ECO-EQ-03
      name: HGT Coupling Trigger
      formula: >
        for (i, j) in node_pairs:
          if coupling_weight(i, j) > PHI_INV:
            trigger HGT(gene_i, gene_j)
            K_epistasis += 1 (up to Fibonacci ceiling)
      symbols:
        PHI_INV: 0.6180339887
      description: >
        Horizontal gene transfer fires when two nodes are strongly coupled.
        Coupling weight > Φ⁻¹ means the nodes are already above the cognition
        threshold — they are sharing information. HGT is the genomic analog
        of that information sharing. It increases K, increasing complexity.

  gate_rules:
    - gate: GATE-HEARTBEAT
      condition: "beat_count > last_genome_update_beat"
      on_pass: "run NK fitness recomputation and complexity update"
      on_fail: "skip — genome already updated this beat"
      evaluated_at: "every 873ms"

    - gate: GATE-MINING-DIFFICULTY
      condition: >
        genome_complexity ∈ [0.0, 1.0] AND
        fitness ∈ [0.0, 1.0] AND
        K_epistasis ≤ K_max
      on_pass: "genome_complexity valid — pass to M-MINING"
      on_fail: >
        genome state out of bounds — use last valid genome_complexity —
        log anomaly to OBSERVATORY
      evaluated_at: "before passing genome_complexity to computeMiningState()"

  thresholds:
    PHI_INV:     0.6180339887   # Φ⁻¹ — HGT coupling trigger
    K_MIN:       2              # minimum epistatic neighbors
    K_MAX:       8              # maximum epistatic neighbors (F₆)
    N_GENES:     13             # constitutional gene count (F₇)
    FITNESS_MIN: 0.0
    FITNESS_MAX: 1.0
    HEARTBEAT_MS: 873

  timing: >
    NK fitness computed every HEARTBEAT_MS = 873ms.
    genome_complexity extracted and passed to computeMiningState() after every
    fitness recomputation. HGT triggers evaluated after coupling weight matrix
    update from M-HEBBIAN.

# ── LAYER 4: EXECUTION BINDING ───────────────────────────────
execution:
  backend_module: "src/backend/main.mo"
  backend_state: "genomeState"
  primary_function: "computeGenomeState() → GenomeState"
  secondary_functions:
    - "getGenomeComplexity() : async Float"
    - "getFitness() : async Float"
    - "getGeneration() : async Nat"
    - "evaluateHGT(couplingMatrix: [[Float]]) : async Nat"
  called_by:
    - "solar_heart.mo::tick() — called after M-HEBBIAN coupling update"
    - "main.mo::computeMiningState() — reads genome_complexity from genomeState"
  calls_into:
    - "kernel.mo::PHI_INV"
    - "kernel.mo::PHI_INV3"
    - "kernel.mo::N_NODES"
    - "neuro_emergence.mo::getCouplingWeights() — for HGT trigger evaluation"
  gates_activated:
    - GATE-HEARTBEAT
    - GATE-MINING-DIFFICULTY
  frontend_surface: "src/frontend/src/components/DiagnosticObservatory.tsx"
  frontend_fields:
    - genomeFitness
    - genomeComplexity
    - genomeGeneration
    - hgtEventCount
  replay_recorded: true
  proof_bundle: >
    Every generation increment logged to ANIMA chain.
    HGT events logged with node pair indices and K_epistasis before/after.
    Fitness snapshots logged every 8 beats (not every beat — compresses replay).
  note: >
    Full M-GENOME specification including methylation, histone modification,
    PolII transcription, and phenotype expression is in MOD-STATE-FABRIC
    MODELS.yaml. This artifact covers the economic dimension only.
