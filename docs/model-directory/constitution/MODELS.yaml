      type: Text
      unit: FNV-1a hex digest
      range: "fixed_at_genesis"
      immutable: true
      description: >
        Hash of the full genesis corpus bytes computed at first boot.
        Never recomputed. Never changed. This is the organism's fingerprint.

    - name: genesis_timestamp
