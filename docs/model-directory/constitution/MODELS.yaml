computation:
  primary_equations:
    - id: ANIMA-EQ-01
      name: Genesis Hash
      formula: "origin_hash = FNV-1a(genesis_corpus_bytes)"
      description: >
        Computed exactly once at initGenesis(). The genesis_corpus_bytes
        is the full compressed discipline channel. This hash is the organism's
        identity fingerprint. Every verification check starts here.

    - id: ANIMA-EQ-02
      name: Chain Link Append
      formula: "new_link = FNV-1a(last_link_hash || beat_state_bytes || timestamp)"
      description: >
        Every heartbeat appends a new link. The new link hashes the previous
        link, the current beat state, and the current timestamp. Append-only.
        No link can be modified after appending.

    - id: ANIMA-EQ-03
      name: Precessional Phase
      formula: "precessional_year = (genesis_timestamp / PRECESSION_MS) mod 25920.0"
      symbols:
        PRECESSION_MS: 814_777_920_000  # 25,920 years in milliseconds

  gate_rules:
    - gate: GATE-GENESIS
      condition: "origin_hash == stored_origin_hash"
      on_pass: "allow all downstream computation"
      on_fail: "halt organism — constitutional violation — report to OBSERVATORY"
      evaluated_at: "every session start + every 873ms heartbeat"

  thresholds:
    CHAIN_INTEGRITY: "last_link_hash must hash-chain continuously from origin_hash"
    MAX_CLOCK_DRIFT_MS: 1000

  timing: "chain appended every HEARTBEAT_MS = 873ms; gate evaluated every session start"

# ── LAYER 4: EXECUTION BINDING ───────────────────────────────
execution:
  backend_module: "src/backend/genesis_corpus.mo"
  primary_function: "initGenesis()"
  secondary_functions:
