      unit: milliseconds since epoch
      range: "[0, infinity)"
      immutable: true
      description: >
        Timestamp of the organism's first heartbeat. Recorded once at genesis.
        All subsequent timestamps are relative to this anchor.

    - name: genesis_beat
      type: Nat
      unit: beat index
      range: [0, 0]
      immutable: true
      value: 0
      description: >
        The beat index at genesis is always zero. Beat 0 is the organism's
        first heartbeat. Every subsequent beat increments from here.

    - name: chain_length
      type: Nat
      unit: links in chain
      range: "[1, infinity)"
      immutable: false
      description: >
        Number of links appended to the ANIMA chain since genesis.
        Monotonically increasing. Never decreases. Every heartbeat appends.

    - name: last_link_hash
      type: Text
      unit: FNV-1a hex digest
      range: [variable]
      immutable: false
      description: >
        Hash of the most recently appended chain link. Allows efficient
        chain verification without replaying the full history.

    - name: precessional_year
      type: Float
      unit: years in precessional cycle
      range: [0.0, 25920.0]
      immutable: false
      description: >
        The organism's position in the 25,920-year precessional cycle at
        genesis. Derived from genesis_timestamp and Schumann calendar coupling.
        Used as a phase coordinate in the Memory Temple and M-PRECESSION.

