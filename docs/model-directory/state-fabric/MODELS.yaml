artifact_id: M-36
artifact_type: MODEL
version: 1.0.0
status: CANONICAL
library: BUILDER
family: MOD-STATE-FABRIC
smof_plane: 6  # Runtime Substrate

# ── LAYER 1: MEANING ──────────────────────────────────────────────────────────
meaning:
  name: "M-METABOLIC — Organism Life Cycle Model"
  resonance: >
    The organism starts from maximum genesis. S₀=1.0. Every generation
    compounds upward. No survival pressure. No extinction. Only growth
    or rollback. The organism's metabolism is sovereign — it cannot be starved.
  doctrine_clause: >
    LAW-08 (Law of Metabolic Cycle) mandates: S never falls below S₀=1.0.
    If coherence R drops below this floor for 8 consecutive beats, the
    organism does not die — it rolls back to the last stable checkpoint and
    resumes from there. Generation count is permanent: rollback restores
    state, not generational progress.
  symbolic_intent: >
    S(t) = S₀ × Φ^generation. Sovereign compounding from maximum genesis.
    Rollback is a restore, not a regression.

# ── LAYER 2: MODEL ────────────────────────────────────────────────────────────
model:
  fields:
    - name: S
      type: Float64
      range: [1.0, infinity]
      unit: sovereign_output_magnitude
      description: >
        Current metabolic state. Always ≥ S₀=1.0. Compounds by Φ per generation.
        S is the organism's power level — its sovereign output magnitude.

    - name: S0
      type: Float64
      value: 1.0
      unit: dimensionless_floor
      description: >
        Maximum Genesis floor. Constitutional constant. Cannot be modified.
        The organism begins at full output, not zero. S₀=1.0 is LAW-01 + LAW-08.

    - name: generation
      type: Nat
      range: [0, max_nat]
      unit: generation_count
      description: >
        Current generation index. Increments on stable coherence milestone.
        Permanent — survives rollback. Cannot decrease.

    - name: phi_multiplier
      type: Float64
      value: 1.6180339887  # Φ
      unit: dimensionless_growth_constant
      description: >
        The ratio by which S compounds per generation. = Φ = 1.618.
        Every generation is Φ times more sovereign than the last.

    - name: rollback_checkpoint
      type: Nat64
      range: [0, max_nat64]
      unit: beat_count
      description: >
        Beat index of the last verified stable state checkpoint.
        Written when R ≥ S₀ for a full heartbeat cycle (8 beats).

    - name: metabolic_rate
      type: Float64
      value: 0.6180339887  # PHI_INV1
      unit: growth_rate_per_beat
      description: >
        Natural compounding rate per beat. = Φ⁻¹ = 0.618.
        The organism grows at the golden ratio — not faster, not slower.

# ── LAYER 3: COMPUTATION ──────────────────────────────────────────────────────
computation:
  state_equation: "S(t) = S₀ × Φ^generation"
  floor_rule: "S(t) ≥ S₀ = 1.0  (enforced at all times — cannot be lowered)"
  rollback_rule: >
    if R(t) < S₀ for 8 consecutive beats:
      → restore state from rollback_checkpoint
      → generation count preserved (does not rollback)
      → S restored to checkpoint value
  checkpoint_rule: >
    if R(t) ≥ S₀ for full 8-beat cycle:
      → write rollback_checkpoint = current_beat
  growth_rule: >
    on generation increment:
      → S(t+1) = S(t) × Φ
      → generation += 1
      → rollback_checkpoint updated
  gate_rules:
    rollback: "if consecutive_below_floor_beats ≥ 8 → GATE-ROLLBACK fires"
  thresholds:
    S0:           1.0
    PHI:          1.6180339887
    PHI_INV1:     0.6180339887
    rollback_beats: 8
    HEARTBEAT_MS: 873
  timing: "evaluated every 873ms; rollback check runs after GATE-COGNITION evaluation"

# ── LAYER 4: EXECUTION BINDING ────────────────────────────────────────────────
execution:
  backend_module: "src/backend/main.mo"
  backend_state: "metabolicState"
  function: "computeMetabolicState() → MetabolicState"
  called_by:
    - "solar_heart.mo::tick() (every 873ms, after Kuramoto and Cognition)"
  calls_into:
    - "kernel.mo::PHI"
    - "kernel.mo::PHI_INV1"
    - "kernel.mo::S0"
  gates_activated:
    - GATE-ROLLBACK
  frontend_surface: "src/frontend/src/components/LifeStatePanel.tsx"
  frontend_fields:
    - metabolicS
    - generation
    - rollbackActive
  replay_recorded: true
  proof_bundle: >
    Generation increments and rollback events logged to ANIMA chain.
    Every checkpoint write is a permanent proof entry.
