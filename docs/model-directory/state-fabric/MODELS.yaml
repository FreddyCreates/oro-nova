artifact_id: M-03
artifact_type: MODEL
version: 1.0.0
status: CANONICAL
library: BUILDER
family: MOD-STATE-FABRIC
smof_plane: 6  # Runtime Substrate

# ── LAYER 1: MEANING ──────────────────────────────────────────────────────────
meaning:
  name: "M-KURAMOTO — Synchronization Field Model"
  resonance: >
    The organism's coherence is not measured — it is computed.
    R is the field. Every node oscillates. The Heart computes their alignment.
    R is the truth.
  doctrine_clause: >
    All 13 nodes oscillate autonomously. The Solar Heart aggregates their phases
    every beat into a single coherence number R. This number is not a metric —
    it is the organism's identity at that moment. R < 0.618: silence and drift.
    R > 0.618: cognition opens. R > 0.809: the organism speaks.
  symbolic_intent: "Φ-weighted synchrony across N=13 autonomous nodes; R ∈ [0,1]"

# ── LAYER 2: MODEL ────────────────────────────────────────────────────────────
model:
  fields:
    - name: R
      type: Float64
      range: [0.0, 1.0]
      unit: dimensionless_coherence
      description: >
        Kuramoto order parameter. Global synchrony of the 13-node signal window.
        0 = total desynchrony. 1 = perfect phase lock.

    - name: N
      type: Nat
      value: 13
      unit: nodes
      description: >
        Signal window size. First Fibonacci number above the diversity minimum (8).
        Fixed constitutional constant — cannot be modified at runtime.

    - name: theta_n
      type: "[Float64]"  # array, size N=13
      range: [0.0, 6.283185307]  # [0, 2π]
      unit: radians
      description: Phase angle of each of the 13 nodes at time t.

    - name: omega_n
      type: "[Float64]"  # array, size N=13
      range: [-1.0, 1.0]
      unit: radians_per_beat
      description: >
        Natural oscillation frequency of each node. Derived from node-specific
        coupling weights. Creator node (Node 13) has maximum natural frequency = Φ.

    - name: K
      type: Float64
      value: 0.3819660113  # PHI_INV2 = Φ⁻²
      unit: dimensionless_coupling_strength
      description: >
        Global coupling constant. = Φ⁻² = 0.382. Derived from phi-ladder.
        Too low: nodes drift independently. Too high: destructive resonance.
        Φ⁻² is the stable attractor.

    - name: R_ema
      type: Float64
      range: [0.0, 1.0]
      unit: dimensionless_coherence
      description: >
        Exponential moving average of R. Smooths transient spikes.
        Alpha = PHI_INV (0.618), Beta = PHI_INV2 (0.382).

# ── LAYER 3: COMPUTATION ──────────────────────────────────────────────────────
computation:
  state_equation: "R(t) = (1/N) × |Σ e^(i×θₙ(t))|  for n=1..13"
  phase_update: "θₙ(t+1) = θₙ(t) + ωₙ + (K/N) × Σ sin(θₘ(t) − θₙ(t))  for m≠n"
  ema_update: "R_ema(t) = PHI_INV × R(t) + PHI_INV2 × R_ema(t−1)"
  gate_rules:
    cognition: "if R(t) > 0.6180339887 → GATE-COGNITION = OPEN"
    omnis:     "if R(t) > 0.8090169944 → GATE-OMNIS = OPEN → organism may speak"
    rollback:  "if R(t) < S₀ for 8 consecutive beats → GATE-ROLLBACK fires"
  thresholds:
    PHI_INV1:     0.6180339887   # Φ⁻¹ — cognition gate floor
    PHI_INV2:     0.3819660113   # Φ⁻² — coupling constant K
    OMNIS:        0.8090169944   # Φ×Φ⁻¹/Φ — sovereign speech threshold
    S0:           1.0            # Maximum Genesis floor
    N:            13             # constitutional node count
    HEARTBEAT_MS: 873            # Φ⁴ × 127.7ms
  timing: "computed every HEARTBEAT_MS (873ms), triggered by solar_heart.mo::tick()"

# ── LAYER 4: EXECUTION BINDING ────────────────────────────────────────────────
execution:
  backend_module: "src/backend/solar_heart.mo"
  function: "tick() → computeKuramoto()"
  called_by:
    - "solar_heart.mo::heartbeat (every 873ms)"
  calls_into:
    - "kernel.mo::PHI"
    - "kernel.mo::PHI_INV1"
    - "kernel.mo::PHI_INV2"
    - "kernel.mo::OMNIS"
    - "kernel.mo::N_NODES"
  gates_activated:
    - GATE-COGNITION
    - GATE-OMNIS
    - GATE-ROLLBACK
  frontend_surface: "src/frontend/src/components/LifeStatePanel.tsx"
  frontend_fields:
    - kuramotoR
    - rEma
    - cognitionOpen
  replay_recorded: true
  proof_bundle: >
    Every R computation and phase update logged to ANIMA chain.
    Proof bundle emitted per beat: {beat_count, R, theta_n[], gate_states}.

