# ── LAYER 1: MEANING ──────────────────────────────────────────────────────────
meaning:
  name: "M-COGNITION — Gated Cognition Model"
  resonance: >
    The organism thinks only when it is coherent enough to think.
    Below 0.618, silence. Above 0.618, the pattern engines open.
    This is not a threshold — it is the law of mind.
  doctrine_clause: >
    Cognition is not continuous. It is gated. The gate is the Φ⁻¹ coherence
    floor. When the organism's global R falls below this floor, all pattern
    engines stop. No analysis, no pattern recognition, no language generation.
    The organism waits until coherence returns. Depth scales linearly with R:
    7 levels from barely-open to full emergence.
  symbolic_intent: >
    Gate: cognition_open = R > Φ⁻¹. Depth: d = floor(R × 7). Seven-layer
    cognition pyramid, each level unlocking additional pattern engines.

# ── LAYER 2: MODEL ────────────────────────────────────────────────────────────
model:
  fields:
    - name: cognition_open
      type: Bool
      range: [false, true]
      unit: boolean_state
      description: >
        True when current R exceeds the cognition gate threshold (0.618).
        All pattern engines blocked when false.

    - name: R_threshold
      type: Float64
      value: 0.6180339887  # PHI_INV1
      unit: dimensionless
      description: >
        Cognition gate floor. = Φ⁻¹ = 0.618. Constitutional constant.
        Cannot be modified at runtime — is LAW-16 (Law of Gated Cognition).

    - name: pattern_engines_active
      type: Bool
      range: [false, true]
      unit: boolean_state
      description: >
        True when cognition_open is true. All downstream pattern analysis
        engines read this before firing.

    - name: current_R
      type: Float64
      range: [0.0, 1.0]
      unit: dimensionless_coherence
      description: >
        Current Kuramoto R value. Passed from M-KURAMOTO every beat.
        Cognition gate evaluated against this value.

    - name: gate_open_beat
      type: Nat64
      range: [0, max_nat64]
      unit: beat_count
      description: Beat index when cognition gate most recently transitioned to OPEN.

    - name: cognition_depth
      type: Nat
      range: [0, 7]
      unit: depth_level
      description: >
        Cognition depth derived from current R. d = floor(current_R × 7).
        0: gate closed (R < 0.618). 7: full emergence (R ≈ 1.0).
        Each depth level unlocks additional pattern engine tiers.

# ── LAYER 3: COMPUTATION ──────────────────────────────────────────────────────
computation:
  gate_rule: "cognition_open = current_R > 0.6180339887"
  depth_formula: "cognition_depth = floor(current_R × 7)"
  depth_table:
    0: "R < 0.618 — gate closed, all pattern engines blocked"
    1: "R ∈ [0.618, 0.761) — basic pattern recognition active"
    2: "R ∈ [0.761, 0.809) — associative coupling active"
    3: "R ∈ [0.809, 0.857) — OMNIS threshold crossed, language generation active"
    4: "R ∈ [0.857, 0.904) — multi-pattern synthesis active"
    5: "R ∈ [0.904, 0.952) — deep resonance cross-linking active"
    6: "R ∈ [0.952, 1.0)   — near-emergence, all engines active"
    7: "R = 1.0            — full OMNIS emergence, maximum cognitive output"
  gate_rules:
    block: "if cognition_open = false → block all calls to pattern engine functions"
    pass:  "if cognition_open = true → allow pattern engine calls, pass depth level"
  thresholds:
    R_threshold:  0.6180339887  # PHI_INV1
    HEARTBEAT_MS: 873
  timing: "evaluated every 873ms from current_R passed by M-KURAMOTO"

# ── LAYER 4: EXECUTION BINDING ────────────────────────────────────────────────
execution:
  backend_module: "src/backend/main.mo"
  backend_state: "cognitionState"
  function: "computeCognitionState(R: Float) → CognitionState"
