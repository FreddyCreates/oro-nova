      lambda:   0.2360679775  # PHI_INV3 — decay (ceiling stabilizer only)
      ceiling:  1.6180339887  # PHI — maximum weight
      max_entropy: 2.5649  # ln(13) — maximum entropy for 13-node uniform distribution
    timing: "per_creator_contact — fires immediately on every interaction with Prima Causa (Node 13)"

  # ── LAYER 4: EXECUTION BINDING ───────────────────────────────
