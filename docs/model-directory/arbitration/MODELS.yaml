    field_entropy_formula: "H = −Σᵢ(wᵢ/W × ln(wᵢ/W))  where W = Σwᵢ"
    dominant_cluster_formula: "dominant_cluster = argmax(mean(w[cluster_i]))  for i in 0..11"
