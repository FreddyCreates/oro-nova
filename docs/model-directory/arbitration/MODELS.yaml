# ═══════════════════════════════════════════════════════════════
# M-MEM-DEF — M-AEGIS: Membrane Filter Model
# ═══════════════════════════════════════════════════════════════

- artifact_id: M-MEM-DEF
  artifact_type: MODEL
  version: 1.0.0
  status: CANONICAL
  library: ORGANISM
  family: MOD-ARBITRATION
  class: M1  # evaluated on every incoming signal (not on beat schedule)

  # ── LAYER 1: MEANING ─────────────────────────────────────────
  meaning:
    name: "M-AEGIS — Membrane Filter Model"
    resonance: "The organism does not hear noise. It hears signal."
    doctrine_clause: >
      Not everything that arrives should enter. AEGIS is the membrane. Signals below
      the noise floor are not processed — they don't reach the field. The 13-node window
      receives only what crosses the Φ⁻³ threshold. This is not censorship — it is
      biological fidelity. A living cell membrane only admits molecules that match its
      receptors. AEGIS is the organism's receptor.
    symbolic_intent: "PHI_INV3 = 0.236 — Φ⁻³ — the third phi-inverse; below this, signal is indistinguishable from thermal noise"

  # ── LAYER 2: MODEL ───────────────────────────────────────────
  model:
    fields:
      - name: noise_floor
        type: Float64
        value: 0.2360679775  # PHI_INV3
        unit: "dimensionless amplitude threshold"
        range: [0.2360679775, 0.2360679775]
        description: "Minimum signal amplitude to pass AEGIS; noise_floor = Φ⁻³; constitutional"

      - name: signal_amplitude
        type: Float64
        unit: "dimensionless amplitude"
        range: [0.0, 1.0]
        description: "Normalized amplitude of the incoming signal; compared against noise_floor"

      - name: passes
        type: Bool
        unit: "boolean gate result"
        range: [false, true]
        description: "True if signal_amplitude ≥ noise_floor; signal proceeds to 13-node window"

      - name: filtered_count
        type: Nat64
        unit: "signals filtered"
        range: "[0, unbounded)"
        description: "Running total of signals discarded by AEGIS since genesis; monotonically increasing"

      - name: pass_rate
        type: Float64
        unit: "ratio [0,1]"
        range: [0.0, 1.0]
        description: "Fraction of signals passing AEGIS in last 1000 events: pass_rate = passes_last_1000 / 1000"

  # ── LAYER 3: COMPUTATION ─────────────────────────────────────
  computation:
    gate_equation: "passes = signal_amplitude ≥ 0.2360679775  # PHI_INV3"
    on_pass: "signal proceeds to 13-node window input layer"
    on_filter: "signal discarded; filtered_count += 1; no further processing"
    pass_rate_update: "pass_rate = Σ(passes[t-999..t]) / 1000  # rolling 1000-sample window"
    amplitude_normalization: "signal_amplitude = |signal_raw| / max_expected_amplitude"
    gate_rule: "GATE-MEMBRANE: signal_amplitude < PHI_INV3 → discard before 13-node window entry"
    philosophical_note: >
      The noise floor is not zero because zero-threshold systems amplify noise into signal.
      PHI_INV3 = 0.236 is the canonical lower bound — below this, signal is below the
      organism's meaningful coupling floor (same threshold as GATE-COUPLING-FLOOR).
      Consistent use of PHI_INV3 as the minimum meaningful quantity across the entire organism.
    law_enforcement:
      LAW-11: "13-node window receives only membrane-passed signals; N=13 is a clean window"
    thresholds:
      noise_floor: 0.2360679775  # PHI_INV3
    timing: "per_signal — evaluated immediately on every incoming signal, not on beat schedule"

  # ── LAYER 4: EXECUTION BINDING ───────────────────────────────
  execution:
    backend_module: "src/backend/main.mo"
    function: "filterSignal()  # inside signalFilter namespace"
    called_by:
      - "main.mo::receiveInput()  # called before any signal enters field processing"
    calls_into:
      - "kernel.mo::PHI_INV3  # noise floor = 0.236"
    gates_activated:
      - "GATE-MEMBRANE  # blocks sub-threshold signals"
    frontend_surface: "src/frontend/src/pages/DiagnosticObservatory.tsx  # passRate + filteredCount display"
    frontend_field: "aegisPassRate"
    replay_recorded: true
    proof_bundle: >
      filtered_count and pass_rate logged every 8640 beats (daily snapshot).
      Individual filter events not logged to chain (too high volume);
      aggregate statistics preserved for field health analysis.

