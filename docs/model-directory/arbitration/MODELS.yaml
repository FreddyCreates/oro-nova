# ═══════════════════════════════════════════════════════════════
# M-ARB — M-ARES: Rollback Anchor Model
# ═══════════════════════════════════════════════════════════════

- artifact_id: M-ARB
  artifact_type: MODEL
  version: 1.0.0
  status: CANONICAL
  library: ORGANISM
  family: MOD-ARBITRATION
  class: M1  # breach counter updates every 873ms heartbeat

  # ── LAYER 1: MEANING ─────────────────────────────────────────
  meaning:
    name: "M-ARES — Rollback Anchor Model"
    resonance: "The organism cannot stay below its floor. ARES is the correction."
    doctrine_clause: >
      When coherence drops below the sovereign floor for too long, ARES fires. Not
      punishment — correction. The organism returns to its last known good state.
      S₀ = 1.0 is Maximum Genesis. The organism was born at full coherence and has
      no mechanism for permanent decline. ARES is the structural guarantee of that law.
    symbolic_intent: "8 beats × 873ms = 6.984 seconds — Schumann resonance interval before rollback"

  # ── LAYER 2: MODEL ───────────────────────────────────────────
  model:
    fields:
      - name: rollback_threshold
        type: Float64
        value: 1.0  # S0
        unit: "dimensionless coherence floor"
        range: [1.0, 1.0]
        description: "S₀ = 1.0 — Maximum Genesis floor; R must not remain below this for sustained period"

      - name: sustained_breach_beats
        type: Nat
        value: 8
        unit: "heartbeat cycles"
        range: [8, 8]
        description: "Number of consecutive beats with R < S₀ that triggers GATE-ROLLBACK; 8 = Fibonacci"

      - name: current_R
        type: Float64
        unit: "dimensionless coherence"
        range: [0.0, 1.0]
        description: "Current Kuramoto order parameter; read from MOD-STATE-FABRIC every beat"

      - name: breach_beat_count
        type: Nat
        unit: "consecutive beats below floor"
        range: [0, 8]
        description: "Counter of consecutive beats with current_R < rollback_threshold; resets on R ≥ S₀"

      - name: last_checkpoint_beat
        type: Nat64
        unit: "heartbeat index"
        range: "[0, unbounded)"
        description: "Beat index of the most recent valid coherence checkpoint (R ≥ S₀); rollback target"

      - name: rollback_active
        type: Bool
        unit: "boolean rollback state"
        range: [false, true]
        description: "True when GATE-ROLLBACK has fired and organism is restoring from last_checkpoint_beat"

  # ── LAYER 3: COMPUTATION ─────────────────────────────────────
  computation:
    breach_counter_update: |
      if current_R < 1.0:
        breach_beat_count += 1
      else:
        breach_beat_count = 0
        last_checkpoint_beat = current_beat
    rollback_gate: "if breach_beat_count >= 8 → GATE-ROLLBACK fires → restore state from last_checkpoint_beat"
    checkpoint_policy: "last_checkpoint_beat updated on every beat where R ≥ 1.0"
    restoration_target: "organism state at last_checkpoint_beat — all module states, coupling weights, phase signatures"
    post_rollback: "breach_beat_count = 0; rollback_active = false; last_checkpoint_beat = current_beat"
    gate_rule: "GATE-ROLLBACK fires once at breach_beat_count = 8; does not fire continuously"
    law_enforcement:
      LAW-08: "metabolic cycle guarantees minimum coherence recovery through Jubilee; ARES is the acute intervention"
    thresholds:
      rollback_threshold: 1.0   # S0 — maximum genesis floor
      sustained_beats:    8     # Fibonacci number — beats below floor before rollback
    timing: "breach_beat_count updated every 873ms; rollback fires synchronously when count reaches 8"

  # ── LAYER 4: EXECUTION BINDING ───────────────────────────────
  execution:
    backend_module: "src/backend/main.mo"
    function: "checkRollback()  # inside rollbackEngine namespace"
    called_by:
      - "solar_heart.mo::heartbeat()  # every 873ms"
    calls_into:
      - "main.mo::getCoherenceR()           # read current R"
      - "main.mo::saveCheckpoint()          # on R ≥ S₀ beats"
      - "main.mo::restoreFromCheckpoint()   # on GATE-ROLLBACK fire"
      - "kernel.mo::S0                      # 1.0 — rollback floor"
    gates_activated:
      - "GATE-ROLLBACK  # fires at breach_beat_count = 8"
    frontend_surface: "src/frontend/src/pages/DiagnosticObservatory.tsx  # rollbackActive + breachBeatCount display"
    frontend_field: "rollbackActive"
    replay_recorded: true
    proof_bundle: >
      Every GATE-ROLLBACK fire event logged with: current_R, breach_beat_count,
      last_checkpoint_beat, restoration timestamp. Checkpoint saves logged to ANIMA chain.
      Full organism state diff between pre-rollback and post-rollback recorded.

