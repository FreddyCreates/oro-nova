# ═══════════════════════════════════════════════════════════════
# M-BUILD-PROTOCOLS  |  AI Internal Team Protocols
# ═══════════════════════════════════════════════════════════════

artifact_id: M-BUILD-PROTOCOLS
artifact_type: MODEL
model_name: M-BUILD-PROTOCOLS
version: 1.0.0
status: CANONICAL
class: M2
library: BUILDER
family: MOD-WORKFORCE-BUILD
smof_plane: 5  # Micro Execution

# ── LAYER 1: MEANING ─────────────────────────────────────────
meaning:
  name: "M-BUILD-PROTOCOLS — AI Internal Team Protocols"
  resonance: >
    The organism's AI workers are not generic agents. They are sovereign field
    workers who read the organism's own artifacts and build from them. They do
    not interpret — they compute from the 4-layer encoding. An AI worker that
    reads M-KURAMOTO's Layer 4 execution binding knows exactly which function
    to call, which gate to activate, and what proof bundle to produce. The
    protocol IS the organism's model language made operative.
  doctrine_clause: >
    Every AI worker enters the organism through the BUILDER library. Every
    artifact they produce must follow the canonical 4-layer format. Every
    build task must produce a proof bundle. Every release must pass through
    GATE-BUILD-RELEASE. These are not policies — they are the minimum
    viable encoding for the organism to be able to read and validate what
    its own workers have produced.
  symbolic_intent: >
    Task packet → BUILDER library read → 4-layer code artifact →
    GATE-VALIDATION → proof bundle → GATE-BUILD-RELEASE → organism substrate
    Every step is machine-bindable. Every step produces verifiable output.

# ── LAYER 2: MODEL ───────────────────────────────────────────
model:
  fields:
    - name: task_id
      type: Text
      unit: "TASK-[FAMILY]-[SEQUENCE] format"
      range: [variable text]
      immutable: false
      description: >
        Unique task identifier. Format: TASK-[MODEL_FAMILY]-[SEQUENCE_NUMBER].
        Example: TASK-STATE-FABRIC-007. The FAMILY segment ties every task
        to a specific model family in the directory — ensuring every build
        is traceable to its sovereign model origin.

    - name: assigned_agent
      type: Text
      unit: "AGENT-[ROLE]-[INDEX] format"
      range: [variable text]
      immutable: false
      description: >
        AI worker identifier. Format: AGENT-[ROLE]-[INDEX]. Role defines the
        agent's build scope: ENGINEER (writes code), ARCHITECT (designs structure),
        VALIDATOR (verifies gates), CHRONICLER (writes proof bundles). Index
        is sequential within each role per build cycle.

    - name: reading_path_completed
      type: Bool
      unit: boolean
      range: [false, true]
      immutable: false
      description: >
        True when the AI worker has confirmed reading the canonical path:
        constitution → law registry → model directory → relevant MODELS.yaml.
        Tasks cannot advance to execution phase until reading_path_completed = true.
        This is not an honor system — the agent must produce reading confirmation
        with specific artifact IDs referenced as evidence.

    - name: artifact_produced
      type: Text
      unit: path or reference to produced artifact
      range: [variable text]
      immutable: false
      description: >
        Path or identifier of the primary artifact produced by this task.
        Could be a .mo file path, a MODELS.yaml update, a new README, or a
        YAML schema update. Must be explicit — "see attached" is not valid.

    - name: proof_bundle_complete
      type: Bool
      unit: boolean
      range: [false, true]
      immutable: false
      description: >
        True when the task proof bundle contains all required fields:
        what_was_built, laws_verified, gates_evaluated, canonical_constants_confirmed,
        no_hardcoded_values (verified), zero_exposure_verified, anima_chain_appended.

    - name: gate_verdicts
      type: "{GATE-VALIDATION: Bool, GATE-BUILD-RELEASE: Bool}"
      unit: pass/fail verdicts per gate
      range: [variable]
      immutable: false
      description: >
        Gate evaluation results for this task. Both gates must show true before
        the task is considered complete. gate_verdicts are part of the proof bundle
        and are logged to the ANIMA chain.

    - name: law_violations
      type: "[Text]"
      unit: list of LAW-* IDs for any violations detected
      range: "[0, 23]"
      immutable: false
      description: >
        Laws violated in this task's output, if any. Empty list = no violations.
        Populated by GATE-VALIDATION. Common violations: hardcoded Φ values
        (LAW-10), exposed substrate labels (LAW-09), lowered Node 13 weight
        (LAW-17). Any violation sends task back to assigned agent.

# ── LAYER 3: COMPUTATION ─────────────────────────────────────
computation:
  primary_equations:
    - id: PROTOCOLS-EQ-01
      name: Task Completion Score
      formula: >
        task_complete = (
          reading_path_completed == true
          AND artifact_produced != ""
          AND proof_bundle_complete == true
          AND len(law_violations) == 0
          AND gate_verdicts.GATE-VALIDATION == true
          AND gate_verdicts.GATE-BUILD-RELEASE == true
        )
      description: >
        A task is complete only when all six conditions are simultaneously true.
        Partial completion is not a valid state. A task is either complete or
        it is in progress. This binary definition ensures no partially-verified
        code enters the organism's substrate.

    - id: PROTOCOLS-EQ-02
      name: Proof Bundle Completeness Check
      formula: >
        proof_bundle_fields = [
          "what_was_built",
          "laws_verified_list",
          "gates_evaluated",
          "canonical_constants_confirmed",
          "hardcoded_constants_scan_result",
          "zero_exposure_scan_result",
          "anima_chain_link"
        ]
        proof_bundle_complete = all(field in proof_bundle for field in proof_bundle_fields)
      description: >
        The proof bundle is a machine-readable record that the organism can
        parse and validate. It is not a human summary. Every field must be
        explicitly present. The anima_chain_link is the most important —
        it is the cryptographic anchor that makes the build provable.

    - id: PROTOCOLS-EQ-03
      name: Canonical Constants Scan
      formula: >
        BANNED_LITERALS = [0.618, 1.618, 0.382, 0.236, 0.809, 873, 127.7, 7.83]
        hardcoded_scan = search(artifact_produced, BANNED_LITERALS)
        if len(hardcoded_scan.matches) > 0:
          law_violations.append("LAW-10")
          gate_verdicts.GATE-VALIDATION = false
      description: >
        Every artifact is scanned for hardcoded canonical constants before
        GATE-VALIDATION passes. The scanner checks for both exact matches
        and equivalent decimal approximations. Any match generates a LAW-10
        violation. The fix is always the same: replace with kernel.mo import.

  gate_rules:
    - gate: GATE-VALIDATION
      condition: >
        artifact compiles without error
        AND 4-layer format present (for model docs)
        AND hardcoded_constants_scan == clean
        AND zero_exposure_scan == clean
      on_pass: "advance to GATE-BUILD-RELEASE evaluation"
      on_fail: "task rejected — law_violations populated — return to agent"
      evaluated_at: "on task completion submission"

    - gate: GATE-BUILD-RELEASE
      condition: >
        ALL contributing tasks have gate_verdicts.GATE-VALIDATION == true
        AND proof_bundle_complete == true for all tasks
        AND OBSERVATORY confirms no coherence violations during build
      on_pass: "build released to organism substrate — ANIMA chain appended"
      on_fail: "build held — incomplete tasks flagged — OBSERVATORY notified"
      evaluated_at: "after all contributing tasks complete"

  thresholds:
    MAX_LAW_VIOLATIONS: 0   # zero tolerance — any violation fails the gate
    MAX_HARDCODED: 0        # zero hardcoded constants allowed
    MIN_PROOF_BUNDLE_FIELDS: 7   # all 7 proof bundle fields required

  timing: >
    Task lifecycle: on-demand (not heartbeat-locked).
    GATE-VALIDATION: triggered on task submission.
    GATE-BUILD-RELEASE: triggered on full build completion signal.
    No timing constraint on how long a task takes — quality over speed.

# ── LAYER 4: EXECUTION BINDING ───────────────────────────────
execution:
  backend_module: "src/backend/main.mo"
  backend_state: "workforceState"
  primary_function: "submitTaskArtifact(task: TaskSubmission) → ValidationResult"
  secondary_functions:
    - "createTask(spec: TaskSpec) : async Text"
    - "getTaskStatus(taskId: Text) : async TaskStatus"
    - "releaseBuild(buildId: Text) : async BuildReleaseResult"
    - "getWorkforceState() : async WorkforceState"
    - "getBuildHistory() : async [BuildRecord]"
  called_by:
    - "AI workforce agents — on task completion"
    - "Library Gateway Agent — triggers new tasks when artifact density threshold crossed"
    - "Prima Causa (Node 13) — direct task creation"
  calls_into:
    - "kernel.mo constants — all canonical values"
    - "genesis_corpus.mo::appendChainLink() — logs build releases to ANIMA chain"
    - "main.mo::getCoherenceState() — OBSERVATORY confirms no violations during build"
  gates_activated:
    - GATE-VALIDATION
    - GATE-BUILD-RELEASE
  frontend_surface: "src/frontend/src/components/DiagnosticObservatory.tsx"
  frontend_fields:
    - activeTasks
    - buildHistory
    - gateVerdicts
    - lawViolations
    - proofBundleStatus
  replay_recorded: true
  proof_bundle: >
    Every build release logged to ANIMA chain with full context:
    {build_id, task_ids, gate_verdicts, laws_verified, beat_count_at_release,
    artifact_hashes, assigned_agents}.
    Build history is permanent — never pruned.
    Law violations (even resolved ones) permanently logged.
