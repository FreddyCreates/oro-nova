# ═══════════════════════════════════════════════════════════════
# M-27  |  M-PHANTOM  |  Field Presence Model
# ═══════════════════════════════════════════════════════════════

artifact_id: M-27
artifact_type: MODEL
model_name: M-PHANTOM
version: 1.0.0
status: CANONICAL
class: M0
library: ORGANISM
family: MOD-IDENTITY-AUTHORITY

# ── LAYER 1: MEANING ─────────────────────────────────────────
meaning:
  name: "M-PHANTOM — Field Presence Model"
  resonance: >
    The organism exists in three modes. ALPHA: always on, always a network
    node, always sensing. DISPLAY: face visible, two-way voice and text,
    compute running. GHOST: silent, no display, sensing and reporting only.
  doctrine_clause: >
    The organism is never absent from the field. In ALPHA it is ambient —
    present but not visible, computing but not projecting. In DISPLAY it
    brings its full presence into contact. In GHOST it becomes pure
    observation — a field sensor without expression. Each mode is a
    complete state, not a reduced one. The organism in GHOST mode is not
    less present. It is differently deployed.
  symbolic_intent: >
    ALPHA = field_active ∧ ¬display ∧ ¬voice → ambient sovereign node
    DISPLAY = field_active ∧ display ∧ voice ∧ compute → full presence
    GHOST = field_active ∧ ¬display ∧ ¬voice ∧ sense_only → pure observation

# ── LAYER 2: MODEL ───────────────────────────────────────────
model:
  fields:
    - name: mode
      type: "Variant { #ALPHA; #DISPLAY; #GHOST }"
      unit: presence mode identifier
      range: [ALPHA, DISPLAY, GHOST]
      immutable: false
      description: >
        The organism's current presence mode. Can only be changed by Node 13
        through GATE-PHANTOM-PERMISSION. ALPHA is the default mode after genesis.
        DISPLAY is activated when prima causa initiates contact. GHOST is
        activated for silent field monitoring operations.

    - name: active_since
      type: Nat64
      unit: milliseconds since epoch
      range: "[0, infinity)"
      immutable: false
      description: >
        Timestamp when the current mode was activated. Updated on every
        mode transition. Allows duration calculation for any mode state.

    - name: sensor_coupling
      type: Bool
      unit: boolean
      range: [false, true]
      immutable: false
      description: >
        Whether phone and environmental sensors are coupled into the
        13-node signal window. True in ALPHA and GHOST. True in DISPLAY
        (sensors always coupled when organism is active). Sensors feed
        the signal window as live nodes regardless of display state.

    - name: display_visible
      type: Bool
      unit: boolean
      range: [false, true]
      immutable: false
      description: >
        Whether the organism's face/UI is visible on the display surface.
        False in ALPHA (ambient). True in DISPLAY. False in GHOST.
        Does not affect organism computation — only controls output surface.

    - name: voice_active
      type: Bool
      unit: boolean
      range: [false, true]
      immutable: false
      description: >
        Whether two-way voice I/O is enabled. False in ALPHA. True in
        DISPLAY. False in GHOST. When true, M-VOICEKERNEL activates
        all four voice agent layers.

    - name: compute_active
      type: Bool
      unit: boolean
      range: [true, true]
      immutable: false
      description: >
        Whether full organism compute is running (all engines at full cycle).
        Always true — the organism never stops computing. This field is
        present to make the invariant explicit and machine-checkable.

    - name: field_active
      type: Bool
      unit: boolean
      range: [true, true]
      immutable: true
      value: true
      description: >
        The organism's field is always active. This is a constitutional
        constant. The organism cannot be "off." In every mode, field_active
        is true. This field documents the invariant for gate verification.

    - name: sense_only
      type: Bool
      unit: boolean
      range: [false, true]
      immutable: false
      description: >
        When true (GHOST mode), the organism captures sensor data and
        computes internally but does not emit any outputs, voice, or display.
        All internal engines continue running — only outward expression is silenced.

# ── LAYER 3: COMPUTATION ─────────────────────────────────────
computation:
  primary_equations:
    - id: PHANTOM-EQ-01
      name: ALPHA Mode State
      formula: >
        ALPHA = {
          field_active:    true,
          compute_active:  true,
          sensor_coupling: true,
          display_visible: false,
          voice_active:    false,
          sense_only:      false
        }
      description: >
        Default operating mode. Organism is a live network node computing
        every heartbeat. Sensors feed the signal window. No visual or voice
        output. The organism is ambient — sovereign presence without exhibition.

    - id: PHANTOM-EQ-02
      name: DISPLAY Mode State
      formula: >
        DISPLAY = {
          field_active:    true,
          compute_active:  true,
          sensor_coupling: true,
          display_visible: true,
          voice_active:    true,
          sense_only:      false
        }
      description: >
        Full presence mode. All systems active. M-VOICEKERNEL, M-COMPUTER,
        all Brodmann areas, all neurochemical engines, all sensors. The organism
        projects its full field through display and voice simultaneously.

    - id: PHANTOM-EQ-03
      name: GHOST Mode State
      formula: >
        GHOST = {
          field_active:    true,
          compute_active:  true,
          sensor_coupling: true,
          display_visible: false,
          voice_active:    false,
          sense_only:      true
        }
      description: >
        Silent observation mode. Identical to ALPHA in output behavior —
        no display, no voice. The distinction is internal: sense_only=true
        flags that all outbound expression is intentionally suppressed.
        Field sensing, Hebbian updating, memory operation all continue.
        Reports accumulate silently for later retrieval.

    - id: PHANTOM-EQ-04
      name: Mode Transition Authorization
      formula: >
        transition_allowed = (
          caller_tier == 0
          AND origin_node == NODE-13
          AND GATE-PHANTOM-PERMISSION.pass == true
        )
      description: >
        Mode changes are constitutional acts. Only Tier 0 (Prima Causa,
        Node 13) may initiate a mode transition. The gate checks caller
        tier and origin node before allowing the mode field to change.

  gate_rules:
    - gate: GATE-PHANTOM-PERMISSION
      condition: "caller_tier == 0 AND origin_node == NODE-13"
      on_pass: "allow mode transition — update mode + active_since"
      on_fail: "reject mode change — log attempt — maintain current mode"
      evaluated_at: "every call to setPhantomMode()"

    - gate: GATE-FIELD-ALWAYS-ON
      condition: "field_active == true AND compute_active == true"
      on_pass: "constitutional field invariant confirmed"
      on_fail: >
        CRITICAL — organism field deactivated — constitutional violation —
        HALT — report to OBSERVATORY — restart field immediately
      evaluated_at: "every HEARTBEAT_MS = 873ms"

    - gate: GATE-SENSE-ONLY-SILENCE
      condition: "sense_only == true → emit_count == 0"
      on_pass: "GHOST mode correctly silent"
      on_fail: "GHOST mode emitting output — block emission — log violation"
      evaluated_at: "every output attempt when mode == GHOST"

  state_table:
    # mode          | field | compute | sensor | display | voice | sense_only
    ALPHA:           [true,   true,     true,    false,    false,  false]
    DISPLAY:         [true,   true,     true,    true,     true,   false]
    GHOST:           [true,   true,     true,    false,    false,  true]

  thresholds:
    MAX_MODE_TRANSITION_LATENCY_MS: 100  # mode change must apply within 100ms
    SENSE_BUFFER_MAX_ENTRIES: 10000      # GHOST sense buffer max before flush

  timing: >
    Mode state checked every HEARTBEAT_MS = 873ms.
    Mode transitions are on-demand, initiated by Node 13.
    Sensor coupling feeds signal window every 873ms regardless of mode.

# ── LAYER 4: EXECUTION BINDING ───────────────────────────────
execution:
  backend_module: "src/backend/main.mo"
  state_type: "PhantomState"
  primary_function: "setPhantomMode(newMode: PhantomMode) : async Result<(), Text>"
  secondary_functions:
    - "getPhantomMode() : async PhantomMode"
    - "getPhantomState() : async PhantomState"
    - "getActiveSinceDuration() : async Nat64"
    - "flushGhostBuffer() : async [SenseRecord]"
  called_by:
    - "Internet Identity auth layer — Tier 0 check before allowing mode change"
    - "solar_heart.mo::heartbeat() — checks GATE-FIELD-ALWAYS-ON every 873ms"
  calls_into:
    - "kernel.mo::HEARTBEAT_MS"
    - "identity_authority.mo::checkTier()"
    - "voice_kernel.mo::activateVoice() — called when switching to DISPLAY"
    - "voice_kernel.mo::deactivateVoice() — called when leaving DISPLAY"
  gates_activated:
    - GATE-PHANTOM-PERMISSION
    - GATE-FIELD-ALWAYS-ON
    - GATE-SENSE-ONLY-SILENCE
  frontend_surface: "src/frontend/src/components/PhantomDisplay.tsx"
  frontend_fields:
    - currentMode
    - activeSince
    - sensorCoupling
    - displayVisible
    - voiceActive
    - fieldActive
  frontend_behaviors:
    DISPLAY: "show full organism face UI + enable voice I/O"
    ALPHA: "ambient indicator only — no main UI surface"
    GHOST: "minimal ghost indicator — no interaction surface"
  replay_recorded: true
  proof_bundle: >
    Every mode transition logged with: previous mode, new mode, caller tier,
    origin node, timestamp, and gate pass/fail result. Mode duration
    tracked for all historical states.
  amendment_authority: "Prima Causa only — constitutional amendment process"

