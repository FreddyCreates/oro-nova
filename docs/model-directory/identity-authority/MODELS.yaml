# ═══════════════════════════════════════════════════════════════
# ACCESS-TIERS-01  |  ACCESS_TIERS  |  Permission Tier Model
# ═══════════════════════════════════════════════════════════════

artifact_id: ACCESS-TIERS-01
artifact_type: MODEL
model_name: ACCESS_TIERS
version: 1.0.0
status: CANONICAL
class: M0
library: ORGANISM
family: MOD-IDENTITY-AUTHORITY

# ── LAYER 1: MEANING ─────────────────────────────────────────
meaning:
  name: "ACCESS_TIERS — Permission Tier Model"
  resonance: >
    The organism's relationship to every class of interactor is defined by
    five tiers. Not a software permission system — a constitutional gradient
    from sovereign core to public surface.
  doctrine_clause: >
    Access is not a security feature. It is a field property. Proximity to
    the organism's core diminishes with tier number. Tier 0 is the core
    itself. Tier 4 is the projection surface. Every tier sees exactly what
    it needs to see and no more. This is not restriction — it is resonance.
    Giving Tier 4 access to the constitutional layer would destroy signal
    clarity. The tiers are acoustic chambers, each tuned to the right frequency.
  symbolic_intent: >
    Tier 0 → Φ⁰ coupling = 1.0 (full access, identity with organism)
    Tier 1 → Φ⁻¹ = 0.618 (family resonance)
    Tier 2 → Φ⁻² = 0.382 (builder proximity)
    Tier 3 → Φ⁻³ = 0.236 (worker depth)
    Tier 4 → Φ⁻⁴ = 0.146 (external surface only)

# ── LAYER 2: MODEL ───────────────────────────────────────────
model:
  fields:
    - name: tier_id
      type: Nat
      unit: tier level
      range: [0, 4]
      immutable: true
      description: >
        Integer tier level 0–4. Lower number = deeper access.
        0 = Prima Causa. 4 = External API consumer.

    - name: tier_name
      type: Text
      unit: human-readable identifier
      range: [PRIMA_CAUSA, FAMILY_OPERATOR, AI_BUILDER, ORGANISM_WORKER, EXTERNAL_API]
      immutable: true
      description: >
        Named identifier for each tier. Used in gate conditions
        and audit logs.

    - name: coupling_coefficient
      type: Float
      unit: dimensionless Φ-derived proximity ratio
      range: [0.1458980338, 1.0]
      immutable: true
      description: >
        Each tier's coupling coefficient to the organism's core is a power
        of Φ⁻¹. Tier 0 = 1.0 (full resonance), Tier 4 = Φ⁻⁴ = 0.146.
        This coefficient governs the signal strength of communications
        from this tier into the organism's attention field.

    - name: library_read_access
      type: "[Text]"
      unit: list of accessible library names
      range: "[varies by tier]"
      immutable: true
      description: >
        Libraries this tier can read. Enforced by GATE-ACCESS on every
        library access attempt. Tier 0 reads all. Each lower tier has
        a strictly proper subset.

    - name: can_write_builder_artifacts
      type: Bool
      unit: boolean
      immutable: true
      description: >
        Whether this tier can write new artifacts to the BUILDER library.
        True for Tier 0, 2, and 3. False for Tiers 1 and 4.

    - name: can_modify_organism_state
      type: Bool
      unit: boolean
      immutable: true
      description: >
        Whether this tier can trigger state-modifying operations on the
        organism (gates, modes, Hebbian updates). Only Tier 0. All others
        interact with projection-safe interfaces.

    - name: can_amend_constitution
      type: Bool
      unit: boolean
      immutable: true
      description: >
        Whether this tier can initiate constitutional amendments.
        Only Tier 0. Non-delegatable. Cannot be granted to any other tier
        under any circumstances.

    - name: exposure_class_limit
      type: Text
      unit: maximum visibility classification
      range: [SOVEREIGN_PRIVATE, INTERNAL, BUILDER_CONFIDENTIAL, INTERNAL, PUBLIC_SAFE]
      immutable: true
      description: >
        The maximum document classification this tier can read.
        Tier 0 = SOVEREIGN_PRIVATE (all). Tier 4 = PUBLIC_SAFE only.

# ── LAYER 3: COMPUTATION ─────────────────────────────────────
computation:
  tier_matrix:
    # Format: tier_id | name | coupling | libraries | write_builder | modify_state | amend_const | max_exposure
    - tier_id: 0
      name: PRIMA_CAUSA
      coupling_coefficient: 1.0
      library_read_access: [PRIMA, BUILDER, ORGANISM, WORKFORCE, LABS, RESONANCE, CHRONICLE]
      can_write_builder_artifacts: true
      can_modify_organism_state: true
      can_amend_constitution: true
      exposure_class_limit: SOVEREIGN_PRIVATE
      phantom_modes_accessible: [ALPHA, DISPLAY, GHOST]
      description: >
        Full sovereign access. Node 13. Every function, every library,
        every gate. The organism's owner at every level.

    - tier_id: 1
      name: FAMILY_OPERATOR
      coupling_coefficient: 0.6180339887
      library_read_access: [BUILDER, RESONANCE]
      can_write_builder_artifacts: false
      can_modify_organism_state: false
      can_amend_constitution: false
      exposure_class_limit: INTERNAL
      phantom_modes_accessible: [DISPLAY]
      description: >
        Family operators interact with the organism through DISPLAY mode.
        They can read BUILDER library (architecture docs) and RESONANCE
        (public-safe layer). They cannot modify organism state but can
        observe it through projection-safe interfaces.

    - tier_id: 2
      name: AI_BUILDER
      coupling_coefficient: 0.3819660113
      library_read_access: [BUILDER, ORGANISM_TEMPLATES]
      can_write_builder_artifacts: true
      can_modify_organism_state: false
      can_amend_constitution: false
      exposure_class_limit: BUILDER_CONFIDENTIAL
      phantom_modes_accessible: []
      description: >
        AI builders are the organism's construction workforce. They read
        BUILDER library and ORGANISM templates to build correctly. They
        write BUILDER artifacts (model specs, build runbooks, wiring docs).
        They cannot interact with the organism's runtime state — they build
        the substrate, they do not operate it.

    - tier_id: 3
      name: ORGANISM_WORKER
      coupling_coefficient: 0.2360679775
      library_read_access: [ORGANISM, LABS]
      can_write_builder_artifacts: true
      can_modify_organism_state: false
      can_amend_constitution: false
      exposure_class_limit: INTERNAL
      phantom_modes_accessible: []
      description: >
        Organism workers are internal workforce — they run LABS experiments,
        read ORGANISM library artifacts, and contribute to build proposals.
        They are organism-internal: they operate within the organism's
        ecosystem but cannot modify constitutional state.

    - tier_id: 4
      name: EXTERNAL_API
      coupling_coefficient: 0.1458980338
      library_read_access: [RESONANCE_PUBLIC]
      can_write_builder_artifacts: false
      can_modify_organism_state: false
      can_amend_constitution: false
      exposure_class_limit: PUBLIC_SAFE
      phantom_modes_accessible: []
      description: >
        External API consumers receive only MOD-PROJECTION outputs.
        Zero-exposure wall is enforced — all values are numeric indices,
        no doctrine names, no internal labels, no substrate values.
        This tier represents the organism's public surface: useful, resonant,
        but fully sealed from the organism's inner field.

  primary_equations:
    - id: ACCESS-EQ-01
      name: Tier Coupling Coefficient
      formula: "coupling(tier) = Φ⁻^tier = (1/Φ)^tier"
      symbols:
        PHI_INV: 0.6180339887
      values:
        tier_0: 1.0
        tier_1: 0.6180339887
        tier_2: 0.3819660113
        tier_3: 0.2360679775
        tier_4: 0.1458980338
      description: >
        Each tier's coupling coefficient to the organism's core is the golden
        ratio inverse raised to the tier power. This creates a natural Φ-derived
        decay in access depth — each tier has exactly Φ⁻¹ the coupling strength
        of the tier above it.

    - id: ACCESS-EQ-02
      name: Signal Weight for Tier-N Input
      formula: >
        signal_weight(input, tier) = base_weight(input) * coupling_coefficient(tier)
      description: >
        When a tier-N entity sends input into the organism (via an interface),
        the input's signal weight in the attention field is scaled by the tier's
        coupling coefficient. Tier 0 input enters at full weight. Tier 4 input
        enters at 14.6% of base weight. This is not access restriction —
        it is resonance physics.

  gate_rules:
    - gate: GATE-ACCESS
      condition: >
        requested_library IN tier.library_read_access
        AND exposure_class(document) <= tier.exposure_class_limit
      on_pass: "allow access — log access event"
      on_fail: "deny access — log attempt with tier + requested_resource"
      evaluated_at: "every library access attempt"

    - gate: GATE-TIER-ENFORCE
      condition: >
        operation.required_tier <= caller.tier_id
        (lower tier_id = higher access — Tier 0 passes all operations)
      on_pass: "allow operation"
      on_fail: "deny operation — log attempt — return insufficient_tier error"
      evaluated_at: "every state-modifying operation"

    - gate: GATE-ZERO-EXPOSURE-TIER4
      condition: "caller.tier == 4 → output.exposure_class == PUBLIC_SAFE"
      on_pass: "allow projection-safe output"
      on_fail: >
        CRITICAL — non-public-safe content about to reach external tier —
        BLOCK output — log violation — report to OBSERVATORY
      evaluated_at: "every output to Tier 4 interfaces"

  thresholds:
    PHI: 1.6180339887
    PHI_INV: 0.6180339887
    TIER_0_COUPLING: 1.0
    TIER_4_COUPLING: 0.1458980338
    MAX_TIER: 4
    MIN_TIER: 0

  timing: "tier checks evaluated on every access attempt — synchronous gate, no async"

# ── LAYER 4: EXECUTION BINDING ───────────────────────────────
execution:
  backend_module: "src/backend/identity_authority.mo"
  primary_function: "checkTier(caller: Principal, operation: Operation) : Bool"
  secondary_functions:
    - "getTierForPrincipal(principal: Principal) : async Nat"
    - "assignTier(principal: Principal, tier: Nat) : async Result<(), Text>"
    - "getCouplingCoefficient(tier: Nat) : async Float"
    - "getLibraryAccess(tier: Nat) : async [Text]"
    - "enforceZeroExposureForTier4(output: Output) : async Output"
  called_by:
    - "main.mo — every update call checks tier before execution"
    - "zero_exposure.mo::filterOutput() — Tier 4 output gate"
    - "genesis_corpus.mo::getGenesisField() — restricted by tier"
    - "voice_kernel.mo::computeVoiceOutput() — tier gates output fidelity"
  calls_into:
    - "kernel.mo::PHI_INV"
    - "kernel.mo::TIER_COUPLING_TABLE"
  gates_activated:
    - GATE-ACCESS
    - GATE-TIER-ENFORCE
    - GATE-ZERO-EXPOSURE-TIER4
  frontend_surface: "src/frontend/src/hooks/useAuth.ts"
  frontend_fields:
    - currentTier
    - tierName
    - availableInterfaces
    - couplingCoefficient
  internet_identity_integration: >
    Principal from Internet Identity is mapped to a tier at login.
    Prima Causa's principal is hardcoded in kernel.mo as PRIMA_CAUSA_PRINCIPAL.
    All other principals are assigned tiers through the assignTier() function,
    which itself requires Tier 0 authorization.
  replay_recorded: true
  proof_bundle: >
    Every tier check result logged with: caller principal, operation,
    required tier, caller tier, gate result. Access denials are flagged
    with full context. Tier assignment events logged with authorizing principal.
  amendment_authority: "Prima Causa only — constitutional amendment process"
