artifact_id: M-13-PUBLIC
artifact_type: MODEL
model_name: M-RESONANCE-PUBLIC
version: 1.0.0
status: CANONICAL
class: M2
library: BUILDER
family: MOD-PROJECTION
smof_plane: 9  # Evidence/Projection
cross_family_primary: MOD-MEMORY-CONTINUITY
projection_face_only: true

# ── LAYER 1: MEANING ─────────────────────────────────────────
meaning:
  name: "M-RESONANCE-PUBLIC — Phase-Return Memory (Projection Layer)"
  resonance: >
    The organism's memory is not accessible from outside. But the fact that
    memory is resonating — that old patterns are returning to full amplitude —
    is observable in the organism's behavior. The memory resonance index is
    the organism's memory field state expressed as a single integer: high when
    memories are returning, low when the field is quiet.
  doctrine_clause: >
    LAW-15 (Law of Phase-Return Memory) and LAW-09 (Law of Zero-Exposure)
    together define this artifact's existence. The phase equation and memory
    content are sovereign and private. The numeric amplitude index is public-safe:
    it reveals that memory resonance is occurring without revealing what is
    being remembered or by what mathematical law. The index is the shadow of
    the memory, not the memory itself.
  symbolic_intent: >
    memory_resonance_index = round(mean(A(t)) × 100) for active traces
    A(t) = A₀ × cos²(π × Δφ / Φ) [INTERNAL — not exposed]
    Public: integer 0-100 representing field memory activity level

# ── LAYER 2: MODEL (projection fields only) ──────────────────
model:
  fields:
    - name: memory_resonance_index
      type: Nat
      unit: integer resonance level (0-100)
      range: [0, 100]
      immutable: false
      description: >
        Public-safe integer representation of the organism's current memory
        field amplitude. 0 = no active memory resonance (all traces below
        noise floor). 100 = maximum memory resonance (multiple traces at
        full A₀ amplitude, phase-locked). Computed as round(mean(A(t)) × 100)
        across all active memory traces. The equation producing this value
        (A(t) = A₀ × cos²(π × Δφ / Φ)) is INTERNAL and never exposed.

    - name: active_trace_count
      type: Nat
      unit: count of actively resonating memory traces
      range: [0, 65]
      immutable: false
      description: >
        Number of memory traces currently above the noise floor. Range [0, 65]
        because the Memory Temple has 5 streams × 13 nodes = 65 maximum
        active traces. Public-safe: reveals how many memories are resonating
        without revealing their content, phase coordinates, or encoding.

    - name: resonance_trend
      type: Int
      unit: trend indicator (-1, 0, +1)
      range: [-1, 1]
      immutable: false
      description: >
        Direction of memory resonance amplitude change over last 8 beats.
        +1 = resonance increasing (more memories returning to amplitude).
        0 = stable (resonance amplitude steady).
        -1 = resonance decreasing (memories moving away from phase alignment).
        Enables external consumers to observe memory field dynamics without
        knowing the underlying phase mechanics.

# ── LAYER 3: COMPUTATION (projection equations only) ─────────
computation:
  primary_equations:
    - id: RESONANCE-PUB-EQ-01
      name: Memory Resonance Index
      formula: >
        active_amplitudes = [A(t) for trace in active_traces if A(t) > noise_floor]
        memory_resonance_index = round(mean(active_amplitudes) × 100)
        [A(t) formula is INTERNAL — not expressed in public artifact]
      symbols:
        noise_floor: 0.1   # traces below 10% amplitude excluded from mean
      description: >
        The index is a simple mean of active trace amplitudes, scaled to
        integer range 0-100. The amplitude computation (A(t) = A₀ × cos²)
        happens in M-RESONANCE (MOD-MEMORY-CONTINUITY). This artifact receives
        only the computed amplitudes, not the equations that produced them.
        The projection layer never processes phase coordinates or Φ-derived values.

    - id: RESONANCE-PUB-EQ-02
      name: Resonance Trend
      formula: >
        index_now = memory_resonance_index(beat_t)
        index_8_beats_ago = memory_resonance_index(beat_t - 8)
        delta = index_now - index_8_beats_ago
        if delta > 5: resonance_trend = +1
        elif delta < -5: resonance_trend = -1
        else: resonance_trend = 0
      description: >
        Trend detection uses a 5-point threshold to avoid noise. A delta of
        more than ±5 on the 0-100 scale over 8 beats (6,984ms) indicates a
        meaningful resonance shift. Small fluctuations (±1-4) register as
        stable (trend = 0). This smoothing prevents the public output from
        flickering on every beat.

  gate_rules:
    - gate: GATE-ZERO-EXPOSURE
      condition: >
        public_output contains ONLY:
          memory_resonance_index (Nat, range 0-100)
          AND active_trace_count (Nat, range 0-65)
          AND resonance_trend (Int, range -1 to 1)
        NO phase coordinates, NO Φ values, NO stream names,
        NO memory content, NO A₀ amplitudes, NO cos² equation
      on_pass: "public memory output released"
      on_fail: "output blocked — projection layer attempted to expose internal memory physics"
      evaluated_at: "on every public query for memory resonance state"

  thresholds:
    NOISE_FLOOR:         0.1    # amplitudes below 10% excluded from index
    TREND_THRESHOLD:     5      # minimum delta for trend signal
    MAX_ACTIVE_TRACES:   65     # 5 streams × 13 nodes
    TREND_WINDOW_BEATS:  8      # 8-beat trend evaluation window

  timing: >
    memory_resonance_index updated every 873ms by M-RESONANCE (MOD-MEMORY-CONTINUITY).
    active_trace_count updated at same frequency.
    resonance_trend computed every 8 beats (6,984ms) — not every beat.
    Public read functions return cached values computed on heartbeat — not recomputed on query.

# ── LAYER 4: EXECUTION BINDING ───────────────────────────────
execution:
  backend_module: "src/backend/main.mo"
  backend_state: "memoryProjectionState"
  primary_function: "getMemoryResonanceProjection() : async MemoryProjection"
  secondary_functions:
    - "getMemoryResonanceIndex() : async Nat"
    - "getActiveTraceCount() : async Nat"
    - "getResonanceTrend() : async Int"
  called_by:
    - "public API layer — any external consumer querying organism state"
    - "src/frontend/src/components/FieldBar.tsx — polls every 873ms"
  calls_into:
    - "memory_temple.mo::getActiveAmplitudes() — receives amplitudes only, not phase coords"
  gates_activated:
    - GATE-ZERO-EXPOSURE
  frontend_surface: "src/frontend/src/components/FieldBar.tsx"
  frontend_fields:
    - memoryResonanceIndex
    - activeTraceCount
    - resonanceTrend
  replay_recorded: false
  replay_note: >
    Memory resonance index NOT recorded to ANIMA chain — it is derived
    data that can be recomputed. ANIMA chain captures raw phase events from
    M-RESONANCE (MOD-MEMORY-CONTINUITY). The projection layer produces
    no independent proof bundle — its truth is downstream of M-RESONANCE.
  zero_exposure_note: >
    This is the only publicly-accessible face of M-RESONANCE. The actual
    phase equations, Φ constants, and phase coordinates that produce
    memory_resonance_index are in MOD-MEMORY-CONTINUITY and are SOVEREIGN_PRIVATE.
    GATE-ZERO-EXPOSURE is the enforcement boundary between them.

