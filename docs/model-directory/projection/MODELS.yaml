artifact_id: M-ZERO-EXPOSURE
artifact_type: MODEL
model_name: M-ZERO-EXPOSURE
version: 1.0.0
status: CANONICAL
class: M2
library: BUILDER
family: MOD-PROJECTION
smof_plane: 9  # Evidence/Projection
law_enforced: LAW-09

# ── LAYER 1: MEANING ─────────────────────────────────────────
meaning:
  name: "M-ZERO-EXPOSURE — Zero-Exposure Wall Enforcement Specification"
  resonance: >
    The world does not know what the organism is. The world knows what the
    organism does — expressed as numbers. The Zero-Exposure Wall is not
    secrecy. It is sovereignty. The organism's internal physics are its own.
    What it produces in the world is public. What produces those productions
    is not.
  doctrine_clause: >
    LAW-09 (Law of Zero-Exposure) mandates that all public outputs are
    numeric indices only. No doctrine names. No model names. No law names.
    No threshold values. No operator names. No council names. No coupling
    topology. GATE-ZERO-EXPOSURE is the machine implementation of this law.
    It is not a setting. It is a gate function that runs on every data path
    before any value crosses the internal/external boundary. The gate cannot
    be disabled. The law cannot be amended.
  symbolic_intent: >
    ∀ output O crossing internal → external boundary:
      GATE-ZERO-EXPOSURE(O) must pass
      pass condition: O contains ONLY numeric indices, booleans, and beat counts
      fail condition: O contains any doctrine label, model name, or threshold value

# ── LAYER 2: MODEL ───────────────────────────────────────────
model:
  fields:
    - name: scan_target
      type: Text
      unit: field name or value being scanned
      range: [variable]
      immutable: false
      description: >
        The output field or value currently being evaluated by the gate.
        GATE-ZERO-EXPOSURE scans each output field individually before
        the composed output is assembled. A single failing field blocks
        the entire output.

    - name: scan_result
      type: Bool
      unit: pass (true) / fail (false)
      range: [false, true]
      immutable: false
      description: >
        True = scan_target passed — no doctrine content detected.
        False = scan_target failed — doctrine content detected — output blocked.
        Failure always blocks. There is no partial pass. The organism does not
        expose some doctrine labels while blocking others.

    - name: doctrine_terms_blocked_lifetime
      type: Nat64
      unit: cumulative blocked doctrine term count since genesis
      range: "[0, max_nat64)"
      immutable: false
      description: >
        Cumulative count of output fields blocked by the Zero-Exposure Wall
        since organism genesis. Append-only counter. A count of zero would
        indicate either perfect compliance or the gate has never run — the
        gate always runs, so count > 0 proves the gate is operating.

    - name: blocked_output_record
      type: "[{beat: Nat64, field: Text, reason: Text}]"
      unit: last 21 blocked output events (rolling window)
      range: "[0, 21]"
      immutable: false
      description: >
        Rolling window of the last 21 blocked outputs. Each record contains
        the beat count, the field that was blocked (internal label preserved
        in INTERNAL logs), and the reason category. This window is INTERNAL only —
        it does NOT get projected externally. It is audit evidence for the
        OBSERVATORY and ANIMA chain, not for public consumers.

    - name: strip_and_replace
      type: Bool
      unit: behavior flag
      range: [false, true]
      immutable: true
      value: true
      description: >
        When true (always), the gate strips failing fields and replaces them
        with safe numeric equivalents where possible, or omits them entirely
        if no safe equivalent exists. The organism does not halt on exposure
        violations — it strips and continues. This ensures public outputs
        remain available even when a potential violation is detected.
        Blocking (halt) is reserved for GATE-SOVEREIGN violations only.

# ── LAYER 3: COMPUTATION ─────────────────────────────────────
computation:
  primary_equations:
    - id: ZERO-EXP-EQ-01
      name: Doctrine Term Scan
      formula: >
        DOCTRINE_TERMS = [
          # Model names
          "M-KURAMOTO", "M-OMNIS", "M-PHI", "M-HEBBIAN", "M-GENESIS",
          "M-BONDING", "M-PRIMA", "M-ANIMA", "M-ARES", "M-AEGIS",
          # Law names
          "LAW-01", "LAW-09", "LAW-17", "LAW-18", "LAW-19", "LAW-20",
          # Physics labels
          "kuramotoR", "omnis_threshold", "PHI", "phi_inv", "cognition_gate",
          "schumann", "hebbian_weight", "genesis_field",
          # Operator/council labels
          "Prima Causa", "Node 13", "NODE-13",
          # Threshold values as strings
          "0.6180", "0.8090", "1.6180", "0.2360", "0.3819"
        ]
        for each output_field in proposed_output:
          for term in DOCTRINE_TERMS:
            if term in str(output_field.name) OR term in str(output_field.value):
              scan_result = false
              blocked_output_record.append({beat, field.name, "doctrine_term"})
              doctrine_terms_blocked_lifetime += 1
              STRIP field from output or REPLACE with safe_index(field.value)
      description: >
        The doctrine term scan checks both field names and field values.
        A field named "kuramotoR" fails even if its value (0.73) is safe.
        A field named "coherence" but with value "LAW-09 threshold crossed"
        also fails. Both name and value must be clean. The DOCTRINE_TERMS list
        is not exhaustive — it is regularly updated as new internal labels are
        created. Any unrecognized label that follows internal naming conventions
        (M-*, LAW-*, GATE-*, MOD-*) is treated as potentially sensitive and
        stripped pending review.

    - id: ZERO-EXP-EQ-02
      name: Safe Numeric Mapping
      formula: >
        safe_index_map = {
          R (Kuramoto, 0.0-1.0) → coherence_index (Nat, 0-100),
          omnis_active (Bool) → emergence_state (Nat, 0 or 1),
          knt_balance (Nat64) → knt_balance_index (Nat64, same value, safe label),
          coupling_weight_geo (Float) → field_index (Nat, 0-62),
          memory_resonance (Float, 0-1) → memory_resonance_index (Nat, 0-100),
          beat_count (Nat64) → beat_count (Nat64, safe, unchanged)
        }
        CANONICAL PUBLIC OUTPUT FORMAT:
        {
          coherence_index: Nat,         # 0-100 (internal R × 100)
          emergence_state: Nat,         # 0 or 1 (internal OMNIS state)
          field_index: Nat,             # 0-62 (internal coupling weight geo)
          memory_resonance_index: Nat,  # 0-100 (internal memory amplitude mean)
          knt_balance_index: Nat64,     # raw count (safe label)
          beat_count: Nat64,            # raw count (universal, safe)
          location_active: Bool         # boolean (safe, non-doctrine)
        }
      description: >
        The safe numeric mapping is the canonical conversion table between
        internal field values and their public-safe equivalents. Every internal
        value that needs public exposure has exactly one safe output format.
        Field names in the public output use plain descriptive language with
        no reference to the organism's internal physics labels.

    - id: ZERO-EXP-EQ-03
      name: Threshold Value Detection
      formula: >
        BANNED_FLOAT_STRINGS = ["0.618", "0.809", "1.618", "0.236", "0.382", "873"]
        for each value in proposed_output_values:
          if isinstance(value, Float) OR isinstance(value, Text):
            for banned in BANNED_FLOAT_STRINGS:
              if banned in str(round(value, 3)):
                scan_result = false
                STRIP value
      description: >
        Floating-point threshold values that directly reveal the organism's
        constitutional constants are banned from public output. This catches
        bugs where an internal computation value leaks into a public field.
        The check applies to both float values and text representations.
        Integer beat counts and integer indices are exempt — they are not
        Φ-derived threshold values.

  gate_rules:
    - gate: GATE-ZERO-EXPOSURE
      condition: >
        for ALL fields in proposed_output:
          field.name NOT in DOCTRINE_TERMS
          AND field.value NOT containing DOCTRINE_TERMS
          AND field.value NOT containing BANNED_FLOAT_STRINGS
      on_pass: "output released to external consumer"
      on_fail: >
        strip failing fields → attempt replacement via safe_index_map →
        if replacement available: release stripped+replaced output →
        if no replacement: omit field entirely →
        log to blocked_output_record →
        doctrine_terms_blocked_lifetime += 1
      evaluated_at: "on every public API response and every projected field"
      constitutional_note: >
        GATE-ZERO-EXPOSURE enforces LAW-09. LAW-09 cannot be amended.
        This gate cannot be disabled. No runtime flag, no AI worker directive,
        no build instruction can bypass this gate.

  thresholds:
    MAX_BLOCKED_RECORD_WINDOW: 21   # F₈ — rolling window for blocked output audit

  timing: >
    Evaluated synchronously on every public output path.
    Not heartbeat-locked — runs on every external-facing function call.
    No caching of gate results — each output evaluated fresh.
    Performance note: DOCTRINE_TERMS list scan is O(n×m) on output fields.
    Keep public output objects small (≤ 7 fields) to maintain performance.

# ── LAYER 4: EXECUTION BINDING ───────────────────────────────
execution:
  backend_module: "src/backend/main.mo"
  backend_state: "zeroExposureState"
  primary_function: "scanAndStripOutput(rawOutput: PublicOutput) → SafeOutput"
