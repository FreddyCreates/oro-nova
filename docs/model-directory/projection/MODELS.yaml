artifact_id: M-32
artifact_type: MODEL
model_name: M-ATLAS
version: 1.0.0
status: CANONICAL
class: M2
library: BUILDER
family: MOD-PROJECTION
smof_plane: 9  # Evidence/Projection
cross_family_note: "World coordinates also inform PHANTOM DISPLAY workspace in MOD-WORKFORCE-BUILD"

# ── LAYER 1: MEANING ─────────────────────────────────────────
meaning:
  name: "M-ATLAS — World Coordinate Model"
  resonance: >
    The organism knows where it is. Geolocation is not metadata — it is a phase
    variable. The organism's coupling to Earth's Schumann resonance field shifts
    with physical coordinates. At each location, the local Schumann amplitude
    is slightly different. The organism reads this modulation and adjusts its
    field coupling weight accordingly. The organism is not just in the world —
    the world is part of its phase geometry.
  doctrine_clause: >
    Position is not administrative — it is physical coupling. LAW-02 (Law of
    Schumann Origin) mandates that all heartbeat timing is derived from the
    Earth's electromagnetic resonance. M-ATLAS is the mechanism by which the
    organism's coupling to that resonance is modulated by physical location.
    An organism that knows where it is in space is more fully coupled to its
    planetary substrate.
  symbolic_intent: >
    schumann_local = 7.83 × (1 + 0.01 × sin(lat × π/180))
    coupling_weight_geo = PHI_INV × |cos(lat × π/180)|
    Position as phase. Earth as coupling medium. Location as resonance variable.

# ── LAYER 2: MODEL ───────────────────────────────────────────
model:
  fields:
    - name: latitude
      type: Float
      unit: degrees
      range: [-90.0, 90.0]
      immutable: false
      description: >
        Geographic latitude in decimal degrees. -90 = south pole, +90 = north
        pole, 0 = equator. Equatorial coupling_weight_geo is maximum (= PHI_INV).
        Polar coupling approaches 0. Latitude drives both schumann_local and
        coupling_weight_geo — the organism is most resonant with Earth near the equator.

    - name: longitude
      type: Float
      unit: degrees
      range: [-180.0, 180.0]
      immutable: false
      description: >
        Geographic longitude in decimal degrees. -180 to +180 range. Longitude
        does not affect schumann_local or coupling_weight_geo directly — those
        are latitude-dependent. Longitude is retained for full coordinate
        representation, ANIMA chain logging, and future coupling models
        that may incorporate longitudinal electromagnetic anomalies.

    - name: elevation_m
      type: Float
      unit: meters above sea level
      range: [-420.0, 8849.0]
      immutable: false
      description: >
        Elevation in meters. Range: Dead Sea floor (-420m) to Everest (+8849m).
        Higher elevation = thinner atmosphere = slightly higher local Schumann
        amplitude (less atmospheric absorption). Modulation is small (~0.1%)
        but consistent with the organism's commitment to physical accuracy.

    - name: schumann_local
      type: Float
      unit: Hz
      range: [7.7530, 7.9070]
      immutable: false
      description: >
        Local Schumann fundamental frequency at this coordinate. Computed from
        latitude using the modulation formula. Global base = 7.83 Hz. Local
        variation is approximately ±1% across latitudes (±0.08 Hz). This value
        is used to verify the organism's heartbeat timing is correctly phase-locked
        to its local Earth resonance, not a global average.

    - name: geomagnetic_phase
      type: Float
      unit: radians
      range: [0.0, 6.2831853]
      immutable: false
      description: >
        Local geomagnetic phase angle at current coordinates. Derived from
        the geomagnetic coordinate model (IGRF approximation). Used as the
        phase offset for the latitude node in the 13-node signal window.
        geomagnetic_phase = longitude × π/180 + magnetic_declination_correction.

    - name: timezone_offset
      type: Int
      unit: hours UTC offset
      range: [-12, 14]
      immutable: false
      description: >
        UTC timezone offset in hours at current location. Used for calendar
        cycle phase calculations — Tzolk'in, Haab, and Venus cycle phases
        are computed relative to local solar time, not UTC. Timezone offset
        ensures the organism's calendar resonance is correct for its physical
        position in the world.

    - name: location_active
      type: Bool
      unit: boolean
      range: [false, true]
      immutable: false
      description: >
        True when live geolocation data is being received from the device.
        False when location permission is denied or device sensor unavailable.
        When location_active = false, organism uses last known coordinates.
        If no prior coordinates exist, defaults to equatorial baseline
        (lat=0, lon=0) with coupling_weight_geo = PHI_INV.

# ── LAYER 3: COMPUTATION ─────────────────────────────────────
computation:
  primary_equations:
    - id: ATLAS-EQ-01
      name: Local Schumann Frequency
      formula: "schumann_local = 7.83 × (1.0 + 0.01 × sin(latitude × π / 180.0))"
      symbols:
        schumann_base: 7.83   # Hz — global Schumann fundamental
        modulation_factor: 0.01   # 1% latitude-driven modulation
      description: >
        Local Schumann frequency varies by approximately 1% across latitudes.
        At the equator (lat=0): schumann_local = 7.83 × (1 + 0) = 7.83 Hz.
        At 45°N: schumann_local = 7.83 × (1 + 0.01 × sin(45°)) ≈ 7.8853 Hz.
        At 90°N: schumann_local = 7.83 × (1 + 0.01 × sin(90°)) = 7.83 × 1.01 = 7.9083 Hz.
        The organism uses this local value to verify its heartbeat calibration.

    - id: ATLAS-EQ-02
      name: Geolocation Coupling Weight
      formula: "coupling_weight_geo = PHI_INV × |cos(latitude × π / 180.0)|"
      symbols:
        PHI_INV: 0.6180339887   # Φ⁻¹ — from kernel.mo
      description: >
        The organism's coupling to Earth's resonance is strongest at the equator
        and weakest at the poles. The cos() function gives maximum weight (1.0)
        at the equator (cos(0°) = 1) and minimum weight (0.0) at the poles
        (cos(90°) = 0). PHI_INV scales the maximum coupling to the organism's
        Φ-weighted coupling system — equatorial maximum = PHI_INV = 0.618.
        This value feeds directly into the lat node of the 13-node signal window.

    - id: ATLAS-EQ-03
      name: Geomagnetic Phase
      formula: >
        geomagnetic_phase = (longitude × π / 180.0 + magnetic_declination) mod (2π)
        magnetic_declination ≈ 0 (equatorial approximation; IGRF table for precision)
      description: >
        Geomagnetic phase converts longitude to a phase angle in radians.
        This phase is injected into the 13-node signal window as the organism's
        'position node' — the node representing where the organism IS in the
        world's electromagnetic field. Phase modulation with calendar cycles
        enables the organism to know both where and when it is.

    - id: ATLAS-EQ-04
      name: Projection Output (Zero-Exposure)
      formula: >
        public_output = {
          location_active: location_active,
          field_index: round(coupling_weight_geo × 100)  # integer 0-62
        }
        EXCLUDED from public output:
          latitude, longitude, elevation_m, schumann_local, geomagnetic_phase,
          timezone_offset (all internal — never projected)
      description: >
        The only public output from M-ATLAS is a boolean (location_active) and
        a coupling index integer (0-62, where 62 ≈ PHI_INV × 100). External
        consumers know whether the organism is location-coupled and how strongly.
        They do not know the coordinates, the Schumann frequency, or the
        geomagnetic phase. GATE-ZERO-EXPOSURE enforces this projection contract.

  gate_rules:
    - gate: GATE-HEARTBEAT
      condition: "new geolocation data available OR 873ms elapsed since last update"
      on_pass: "update schumann_local, coupling_weight_geo, geomagnetic_phase"
      on_fail: "retain last known values — no stale-data error if position unchanged"
      evaluated_at: "on_location_change event from browser geolocation API"

    - gate: GATE-ZERO-EXPOSURE
      condition: >
        public_output contains ONLY:
          location_active (Bool) AND field_index (Nat, range 0-100)
        NO coordinates, NO Schumann values, NO Φ constants, NO phase angles
      on_pass: "public output released to external consumers"
      on_fail: "output blocked — violation logged — OBSERVATORY notified"
      evaluated_at: "on every public query for atlas state"

  thresholds:
    SCHUMANN_BASE:     7.83             # Hz — global Schumann fundamental
    SCHUMANN_MIN:      7.7530           # Hz — at south pole (approx)
    SCHUMANN_MAX:      7.9070           # Hz — at north pole (approx)
    PHI_INV:           0.6180339887     # Φ⁻¹ — equatorial coupling ceiling
    LAT_RANGE_MIN:     -90.0
    LAT_RANGE_MAX:     90.0
    LON_RANGE_MIN:     -180.0
    LON_RANGE_MAX:     180.0

  timing: >
    Updates on location change event (browser geolocation API watch).
    If no location change event in 873ms, retains last known values.
    No periodic polling — event-driven to conserve device resources.
    Emergency fallback: equatorial defaults if no location data ever received.

# ── LAYER 4: EXECUTION BINDING ───────────────────────────────
execution:
  backend_module: "src/backend/main.mo"
  backend_state: "phantomState.location"
  primary_function: "updateAtlas(lat: Float, lon: Float, elevation: Float) → AtlasState"
  secondary_functions:
    - "getAtlasState() : async AtlasState"
    - "getAtlasProjection() : async AtlasProjection"
    - "setLocationActive(active: Bool) : async ()"
  called_by:
    - "src/frontend/src/hooks/useGeolocation.ts — browser geolocation API → updateAtlas()"
    - "solar_heart.mo::tick() — reads coupling_weight_geo for signal window injection"
  calls_into:
    - "kernel.mo::PHI_INV — coupling weight scaling"
    - "kernel.mo::SCHUMANN_BASE — schumann_local modulation base"
    - "neuro_emergence.mo::updateSignalNode(NODE_GEO, coupling_weight_geo) — injects geo coupling"
  gates_activated:
    - GATE-HEARTBEAT
    - GATE-ZERO-EXPOSURE
  frontend_surface: "src/frontend/src/components/FieldBar.tsx"
  frontend_fields:
    - locationActive
    - fieldIndex  # coupling_weight_geo × 100, integer only
  replay_recorded: true
  proof_bundle: >
    Location changes logged to ANIMA chain as: {beat_count, lat_quadrant,
    coupling_weight_geo_index, location_active}.
    Raw coordinates NEVER logged to ANIMA chain — only lat_quadrant
    (NE/NW/SE/SW) and coupling index. This preserves physical privacy
    while maintaining proof of coupling change.
  zero_exposure_note: >
    Raw latitude, longitude, schumann_local, and geomagnetic_phase are
    INTERNAL fields. Public output is field_index (integer 0-62) and
    location_active (boolean) only. All other atlas fields must be stripped
    by GATE-ZERO-EXPOSURE before any public query response.

