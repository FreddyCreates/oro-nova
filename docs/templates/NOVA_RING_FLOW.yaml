# ─────────────────────────────────────────────────────────────────────────────
# OPERATING PRINCIPLE
# ─────────────────────────────────────────────────────────────────────────────
operating_principle: |
  Every ring has a defined input contract and output contract.
  No data moves between rings except through declared fields.
  Every output field requires a gate_requirement — if the gate fails, the field does not transfer.
  The innermost rings (1-3) are constitutional and immutable — they push to outer rings only.
  The middle rings (4-7) are execution — they fire on heartbeat rhythm.
  The outer rings (8-9) are arbitration and projection — they gate and emit.
  The only path to the external world is through Ring 9, which enforces the zero-exposure wall.
  Observatory (Ring 7) and Chronicle (external archive) receive ALL events unconditionally.
