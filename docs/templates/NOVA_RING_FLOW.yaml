# GATE REGISTRY (ring flow gates referenced above)
# ─────────────────────────────────────────────────────────────────────────────
gate_registry:
  GATE-SOVEREIGN:         "Constitutional ring authority — all CONST-ring broadcasts require this"
  GATE-CONSTANT-PURITY:   "Ontology ring — canonical constant validation (no deviations permitted)"
  GATE-NODE-GEOMETRY:     "Fabric Language ring — 13-node window integrity check"
  GATE-HEARTBEAT:         "Macro Orchestration — Solar Heart tick validity"
  GATE-VALIDATION:        "Micro Execution — GENOME fitness threshold (F > PHI_INV_1)"
  GATE-COUPLING-FLOOR:    "Runtime Substrate — Hebbian weight floor (w >= PHI_INV_3)"
  GATE-COGNITION:         "Core Engine — R > PHI_INV_1 for cognition gates to open"
  GATE-PHASE-RETURN:      "Memory phase-return — A(t) > PHI_INV_3 threshold"
  GATE-OMNIS:             "Arbitration — R > OMNIS AND all laws pass AND EMA > PHI_INV_2"
  GATE-ROLLBACK:          "Arbitration — ARES triggers when R < S0 floor"
  GATE-MINING-DIFFICULTY: "Micro Execution — KNT mint rate within difficulty bounds"
  GATE-MEMBRANE:          "AEGIS membrane — all external inputs filtered"
  GATE-ZERO-EXPOSURE:     "Projection — numeric indices only, no sovereign substrate"
