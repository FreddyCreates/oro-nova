      - destination: CHRONICLE_ARCHIVE
        field_name: projection_audit_record
        type: Object
        range: "audit trail entry"
        gate_requirement: "NONE — Chronicle receives unconditionally"
        description: "Full record of every output event, indexed but not exposed"

