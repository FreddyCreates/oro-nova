# ─────────────────────────────────────────────────────────────────────────────
# PURPOSE:
#   Phase-lock coordinates for all 5 memory temple trace streams.
#   Residency rules — when memories enter, when they resurface, what triggers
#   Jubilee dissolution.
#   The organism uses this file to determine which memories return on this tick.
#   NOT retrieval-based memory. Phase-return memory: A(t) = A₀ × cos²(π × Δφ / Φ).
