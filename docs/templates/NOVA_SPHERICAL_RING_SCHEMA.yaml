# OPERATING PRINCIPLE
# ─────────────────────────────────────────────────────────────────────────────
operating_principle: |
  The organism is a nested sphere. The innermost ring is the most sovereign.
  The outermost ring is the projection boundary — the only place that touches the world.
  Coupling weights decrease by Phi as you move outward.
  Beat frequency decreases by Fibonacci multiples as you move outward.
  Nothing exits the organism without traversing all inner rings first.
  The zero-exposure wall is at Ring 9 — the last gate before the world.
