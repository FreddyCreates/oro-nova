# ─────────────────────────────────────────────────────────────────────────────
# CANONICAL CONSTANTS
# ─────────────────────────────────────────────────────────────────────────────
constants:
  PHI:          1.6180339887
  PHI_INV_1:    0.6180339887
  PHI_INV_2:    0.3819660113
  PHI_INV_3:    0.2360679775
  PHI_INV_4:    0.1458980338
  HEARTBEAT_MS: 873.0
  TAU:          6.2831853072

# ─────────────────────────────────────────────────────────────────────────────
# RING FIELD SCHEMA — template definition
# Every ring instantiation uses exactly these fields.
# ─────────────────────────────────────────────────────────────────────────────
ring_schema:
  ring_id:
    type: Text
    format: "RING-*"
    required: true
    description: "Unique ring identifier — permanent, never changes"

  name:
    type: Text
    required: true
    description: "Human-readable name for this ring"

  smof_plane:
    type: Nat
    range: "[1, 9]"
    required: true
    description: "SMOF plane number this ring corresponds to (1=Constitutional, 9=Projection)"

  model_family:
    type: Text
    format: "MOD-*"
    required: true
    description: "Which sovereign model family governs this ring"

  inner_radius:
    type: Float64
    unit: "PHI units"
    constraint: "must be a power or product of PHI"
    required: true
    description: "Inner boundary of this ring shell — Phi-derived"

  outer_radius:
    type: Float64
    unit: "PHI units"
    constraint: "outer_radius = inner_radius * PHI"
    required: true
    description: "Outer boundary — always PHI times the inner radius"

  coupling_weight:
    type: Float64
    unit: dimensionless
    constraint: "must be in [PHI_INV_4, 1.0], must be a power of PHI"
    required: true
    description: "Coupling weight for this ring — innermost ring = PHI^0 = 1.0"

  phase_offset:
    type: Float64
    unit: radians
    range: "[0.0, TAU]"
    required: true
    description: "Phase offset of this ring's oscillation from the Solar Heart base phase"

  law_constraints:
    type: "[Text]"
    format: "['LAW-*', ...]"
    required: true
    description: "All LAW-* IDs that govern this ring — all must pass before ring fires"

  gate_id:
    type: Text
    format: "GATE-*"
    required: true
    description: "The primary gate that controls this ring's output"

  beat_multiple:
    type: Nat
    range: "[1, ∞)"
    description: "How many 873ms beats per complete ring cycle. Ring k fires every PHI^k beats."
    required: true

  members:
    type: "[Text]"
    format: "['M-*', ...]"
    required: true
    description: "All model IDs whose computation belongs to this ring"

  class:
    type: Text
    enum: [M0, M1, M2]
    description: "M0=immutable/constitutional, M1=heartbeat-updated, M2=runtime-mutable"
    required: true

  exposure_class:
    type: Text
    enum: [SEALED, SOVEREIGN_PRIVATE, BUILDER_CONFIDENTIAL, INTERNAL, PUBLIC_SAFE]
    required: true
    description: "How exposed this ring's contents can be"

