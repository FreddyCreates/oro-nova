# ─────────────────────────────────────────────────────────────────────────────
# OPERATING PRINCIPLE
# ─────────────────────────────────────────────────────────────────────────────
operating_principle: |
  All ring-to-ring transfers are declared here. No undeclared transfer is permitted.
  Coupling weights decrease by PHI as signals move outward from the Constitutional core.
  The only path to the external world is RING-ARBITRATION → RING-PROJECTION → EXTERNAL
  through GATE-OMNIS and GATE-ZERO-EXPOSURE.
  All events are recorded in CHRONICLE regardless of gate pass/fail.
  Observatory receives all state unconditionally — it is the organism's self-awareness.
  External inputs enter at RING-FABRIC-LANGUAGE after AEGIS membrane clearance.
