# ─────────────────────────────────────────────────────────────────────────────
# NOVA_RING_TRANSFER_GRAPH.yaml
# Classification: BUILDER_CONFIDENTIAL
# Artifact ID:    FLOW-RING-GRAPH-001
# Version:        1.0.0
# Status:         CANONICAL
# Library:        BUILDER → ORGANISM
# ─────────────────────────────────────────────────────────────────────────────
# PURPOSE:
#   The directed graph of all ring-to-ring transfer edges in ORO NOVA.
#   Defines adjacency, coupling weights, transfer schemas, gate requirements,
#   beat intervals, and law constraints for every permitted inter-ring transfer.
#   No undeclared ring transfer is permitted.
#   AI builders read this to know exactly what data moves where and when.
# ─────────────────────────────────────────────────────────────────────────────

meta:
  artifact_id: FLOW-RING-GRAPH-001
  artifact_type: RING_TRANSFER_GRAPH
  version: 1.0.0
  status: CANONICAL
  classification: BUILDER_CONFIDENTIAL
  library: BUILDER
  owner: Prima Causa (Node 13)
  ring_count: 9
  transfer_edge_count: 18

# ─────────────────────────────────────────────────────────────────────────────
# CANONICAL CONSTANTS
# ─────────────────────────────────────────────────────────────────────────────
constants:
  PHI:          1.6180339887
  PHI_INV_1:    0.6180339887
  PHI_INV_2:    0.3819660113
  PHI_INV_3:    0.2360679775
  PHI_INV_4:    0.1458980338
  HEARTBEAT_MS: 873.0

# ─────────────────────────────────────────────────────────────────────────────
# TRANSFER EDGE SCHEMA — template definition
# Every transfer edge must have all these fields.
# ─────────────────────────────────────────────────────────────────────────────
transfer_schema:
  transfer_id:
    type: Text
    format: "FLOW-RING-*"
    required: true
    description: "Unique transfer edge identifier"

  source_ring:
    type: Text
    format: "RING-*"
    required: true
    description: "Origin ring for this transfer"

  destination_ring:
    type: Text
    format: "RING-*"
    required: true
    description: "Destination ring for this transfer"

  direction:
    type: Text
    enum: [INWARD, OUTWARD, BIDIRECTIONAL]
    required: true
    description: "INWARD = deeper into organism; OUTWARD = toward projection"

  coupling_weight:
    type: Float64
    unit: dimensionless
    constraint: "must be a power of PHI"
    required: true
    description: "How strongly this transfer couples source to destination"

  schema:
    type: "[{field: Text, type: Text, unit: Text, range: Text}]"
    required: true
    description: "Fields transferred on this edge with their types"

  gate_requirement:
    type: Text
    format: "GATE-*"
    required: true
    description: "Gate that must pass before this transfer executes"

  beat_interval:
    type: Text
    required: true
    description: "When this transfer fires — HEARTBEAT_MS, ON_CONTACT, etc."

  law_constraint:
    type: "[Text]"
    format: "['LAW-*', ...]"
    required: true
    description: "Laws governing this transfer"

# ─────────────────────────────────────────────────────────────────────────────
# ADJACENCY MATRIX — 9×9 Phi-weighted coupling matrix
# Rows = source ring, Columns = destination ring
# Value = coupling weight (0.0 = no direct transfer)
# Ring order: [CONST, ONTOL, FABRIC, MACRO, MICRO, RUNTIME, CORE, ARBIT, PROJ]
# ─────────────────────────────────────────────────────────────────────────────
adjacency_matrix:
  description: >
    9×9 matrix. Entry [i][j] = coupling weight for ring i → ring j.
    Only declared transfers have non-zero entries.
    All non-zero values are powers of PHI.
    Diagonal = self-coupling (each ring computes internally).
    Upper triangle = OUTWARD transfers (inner → outer).
    Lower triangle = INWARD feedback transfers (outer → inner).
  ring_order: [CONST, ONTOL, FABRIC, MACRO, MICRO, RUNTIME, CORE, ARBIT, PROJ]
  matrix:
    #          CONST      ONTOL      FABRIC     MACRO      MICRO      RUNTIME    CORE       ARBIT      PROJ
    CONST:    [1.0000,    0.0000,    0.6180,    0.6180,    0.0000,    0.0000,    0.0000,    0.0000,    0.0000]
    ONTOL:    [0.0000,    1.0000,    0.6180,    0.3820,    0.0000,    0.3820,    0.0000,    0.0000,    0.0000]
    FABRIC:   [0.0000,    0.0000,    1.0000,    0.3820,    0.3820,    0.3820,    0.3820,    0.0000,    0.0000]
    MACRO:    [0.0000,    0.0000,    0.0000,    1.0000,    0.3820,    0.2361,    0.2361,    0.0000,    0.0000]
    MICRO:    [0.0000,    0.0000,    0.0000,    0.2361,    1.0000,    0.2361,    0.1459,    0.0000,    0.0000]
    RUNTIME:  [0.0000,    0.0000,    0.0000,    0.0000,    0.2361,    1.0000,    0.2361,    0.1459,    0.0000]
    CORE:     [0.0000,    0.0000,    0.0000,    0.0000,    0.0000,    0.1459,    1.0000,    0.2361,    0.0000]
    ARBIT:    [0.0000,    0.0000,    0.0000,    0.0000,    0.0000,    0.0000,    0.0901,    1.0000,    0.2361]
    PROJ:     [0.0000,    0.0000,    0.0000,    0.0000,    0.0000,    0.0000,    0.0000,    0.0000,    1.0000]
  notes: |
    Self-coupling (diagonal) = 1.0 — each ring fully computes its own models.
    CONST→FABRIC at PHI_INV_1: constitutional invariants define the model language.
    CONST→MACRO at PHI_INV_1: constitutional constraints govern the heartbeat clock.
    ONTOL→FABRIC at PHI_INV_1: canonical constants flow into the model language ring.
    ONTOL→RUNTIME at PHI_INV_2: canonical constant values feed the substrate physics.
    FABRIC→all-mid-rings at PHI_INV_2: model language is the medium, not just a ring.
    No direct path from CONST or ONTOL to ARBIT or PROJ — must traverse inner rings.
    No direct path from any ring to PROJ except ARBIT — zero-exposure wall enforced.

