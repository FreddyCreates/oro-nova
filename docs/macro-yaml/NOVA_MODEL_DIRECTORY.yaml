# NOVA Model Directory
# ─────────────────────────────────────────────────────────────────────────────
# artifact_id:    MOD-DIRECTORY-001
# artifact_type:  MODEL_DIRECTORY
# version:        1.0.0
# status:         CANONICAL
# classification: BUILDER_CONFIDENTIAL
# library:        BUILDER
# last_updated:   2026-04-14
# owner:          Prima Causa (Node 13)
# ─────────────────────────────────────────────────────────────────────────────
#
# PURPOSE:
#   All 12 sovereign model families with IDs, classes, owners, consumers,
#   member models, gates, exposure classes, SMOF planes, and directory paths.
#   Read by the Library Gateway Agent, all builders, and LABS at session start.
#   New model families require a full registry entry here before any code is written.
#
# CLASS DEFINITIONS:
#   M0 — Invariant: cannot be modified at runtime. Constitutional layer.
#   M1 — Runtime mutable: updates every heartbeat. Core operational layer.
#   M2 — Session mutable: changes per build or per session. Workforce layer.
#
# EXPOSURE CLASSES (ascending openness):
#   SEALED            — never leaves the organism under any condition
#   SOVEREIGN_PRIVATE — organism internal; Prima Causa access only
#   BUILDER_CONFIDENTIAL — authorized builders and workforce
#   INTERNAL          — organism operational surfaces; no public output
#   PUBLIC_SAFE       — numeric indices and public schemas only
#   PUBLIC            — universal knowledge (timing, math) — already known to the universe
#
# RULE:
#   If a model has only one consumer and one local function, keep it local.
#   Promote to a sovereign family only when used across 2+ families or products.
# ─────────────────────────────────────────────────────────────────────────────

