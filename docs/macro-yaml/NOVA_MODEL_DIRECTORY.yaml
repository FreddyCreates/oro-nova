# FAMILY DEPENDENCY GRAPH
# ─────────────────────────────────────────────────────────────────────────────
# Reading direction: family X feeds_into Y means X state flows to Y.

family_dependency_graph:
  MOD-CONSTITUTION:
    reads_from:  []
    feeds_into:  [ALL]
  MOD-IDENTITY-AUTHORITY:
    reads_from:  [MOD-CONSTITUTION]
    feeds_into:  [MOD-WORKFORCE-BUILD, MOD-PROJECTION, MOD-STATE-FABRIC]
  MOD-STATE-FABRIC:
    reads_from:  [MOD-CONSTITUTION, MOD-BEAT-TIME, MOD-COUPLING-TRANSFER]
    feeds_into:  [MOD-ARBITRATION, MOD-MEMORY-CONTINUITY, MOD-PROOF-REPLAY, MOD-ECONOMIC]
  MOD-BEAT-TIME:
    reads_from:  [MOD-CONSTITUTION]
    feeds_into:  [ALL]
  MOD-COUPLING-TRANSFER:
    reads_from:  [MOD-CONSTITUTION, MOD-BEAT-TIME]
    feeds_into:  [MOD-STATE-FABRIC, MOD-MEMORY-CONTINUITY]
  MOD-ARBITRATION:
    reads_from:  [MOD-STATE-FABRIC, MOD-COUPLING-TRANSFER, MOD-MEMORY-CONTINUITY]
    feeds_into:  [MOD-PROJECTION, MOD-PROOF-REPLAY]
  MOD-MEMORY-CONTINUITY:
    reads_from:  [MOD-COUPLING-TRANSFER, MOD-BEAT-TIME, MOD-STATE-FABRIC]
    feeds_into:  [MOD-ARBITRATION, MOD-PROOF-REPLAY]
  MOD-PROOF-REPLAY:
    reads_from:  [ALL_WRITE_OPERATIONS]
    feeds_into:  [MOD-WORKFORCE-BUILD]
  MOD-ECONOMIC:
    reads_from:  [MOD-STATE-FABRIC, MOD-PROOF-REPLAY]
    feeds_into:  [MOD-PROJECTION, MOD-WORKFORCE-BUILD]
  MOD-DEFENSE-SAFETY:
    reads_from:  [MOD-CONSTITUTION, MOD-STATE-FABRIC]
    feeds_into:  []
  MOD-WORKFORCE-BUILD:
    reads_from:  [MOD-IDENTITY-AUTHORITY, MOD-PROOF-REPLAY, MOD-ECONOMIC]
    feeds_into:  [MOD-STATE-FABRIC, MOD-PROJECTION]
  MOD-PROJECTION:
    reads_from:  [MOD-ARBITRATION, MOD-ECONOMIC, MOD-WORKFORCE-BUILD]
    feeds_into:  []

# ─────────────────────────────────────────────────────────────────────────────
# OPERATING PRINCIPLE
# ─────────────────────────────────────────────────────────────────────────────
#
# Model families are stable namespaces that survive across builds, products, and APIs.
# A new model belongs to a family before it belongs to a module.
# If a model has only one consumer, it stays local — do not promote to sovereign family.
# If a model is used across 2+ families or products, it earns a family entry here.
# 12 families is the minimum complete set for enterprise operation.
# Every build reads this file before touching any model.
